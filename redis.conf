# Redis configuration for BuyWhere product cache
# Persistence: RDB + AOF for durability with performance
save 900 1
save 300 10
save 60 10000

# AOF for durability
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Memory management for cache workload
maxmemory 256mb
maxmemory-policy allkeys-lru

# Bind configuration
bind 0.0.0.0
protected-mode yes
port 6379

# Security
# requirepass will be set via REDIS_PASSWORD env var in production
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Logging
loglevel notice
logfile ""

# General
databases 16
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
replica-read-only yes
repl-diskless-sync no
repl-diskless-sync-delay 5
repl-disable-tcp-nodelay no
replica-priority 100

# Lazy freeing
lazyfree-lazy-eviction no
lazyfree-lazy-expire no
lazyfree-lazy-server-del no
replica-lazy-flush no

# Append only file
no-appendfsync-on-rewrite no

# Active rehashing
activerehashing yes

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# HZ
hz 10

# AOF rewrite
aof-rewrite-incremental-fsync yes

# Lua scripting
lua-replicate-commands yes

# Latency monitor
latency-monitor-threshold 0

# Event notification
notify-keyspace-events ""

# Set -1 to disable
set-proc-title yes