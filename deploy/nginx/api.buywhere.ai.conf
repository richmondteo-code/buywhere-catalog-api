# api.buywhere.ai — Express API proxy to Cloud Run
# Deployed by nginx-deploy.yml into /etc/nginx/sites-enabled/
# All traffic routed to Cloud Run (local Express VM decommissioned)

server {
    listen 443 ssl http2;
    server_name api.buywhere.ai;

    ssl_certificate /etc/letsencrypt/live/api.buywhere.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.buywhere.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;
    client_body_timeout 60s;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Graceful error response for upstream outages (deploy gaps, crashes).
    # Named location avoids needing a static file on disk.
    error_page 502 503 504 @upstream_error;
    location @upstream_error {
        default_type application/json;
        add_header Cache-Control "no-store" always;
        add_header Retry-After "15" always;
        return 503 '{"error":"service_temporarily_unavailable","message":"API is restarting. Retry in 15 seconds.","retry_after":15}';
    }

    location /.well-known/glama.json {
        alias /home/paperclip/buywhere-api/glama.json;
        add_header Content-Type application/json;
        add_header Cache-Control "public, max-age=86400";
    }

    resolver 8.8.8.8;
    proxy_ssl_server_name on;
    proxy_ssl_name buywhere-api-3cjo6zft4q-as.a.run.app;

    location / {
        proxy_pass https://buywhere-api-3cjo6zft4q-as.a.run.app;
        proxy_http_version 1.1;
        proxy_set_header Host buywhere-api-3cjo6zft4q-as.a.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }

    # MCP JSON-RPC endpoint — BUY-6843/BUY-6886: no trailing slash on location to prevent
    # nginx's automatic 301 redirect that breaks tools/call for SDK clients.
    location /mcp {
        proxy_pass https://buywhere-api-3cjo6zft4q-as.a.run.app;
        proxy_http_version 1.1;
        proxy_set_header Host buywhere-api-3cjo6zft4q-as.a.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_buffering off;
    }
}
