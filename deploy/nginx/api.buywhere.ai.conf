# Site fragment for api.buywhere.ai
# Deployed by nginx-deploy.yml into /etc/nginx/sites-enabled/
# Global http-level settings (gzip, log_format, etc.) live in /etc/nginx/nginx.conf.

upstream express_api {
    server 127.0.0.1:3000;
    keepalive 8;
    keepalive_timeout 65s;
}

server {
    listen 443 ssl http2;
    server_name api.buywhere.ai;

    ssl_certificate /etc/letsencrypt/live/api.buywhere.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.buywhere.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;
    client_body_timeout 60s;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Graceful error response for upstream outages (deploy gaps, crashes).
    # Named location avoids needing a static file on disk.
    error_page 502 503 504 @upstream_error;
    location @upstream_error {
        default_type application/json;
        add_header Cache-Control "no-store" always;
        add_header Retry-After "15" always;
        return 503 '{"error":"service_temporarily_unavailable","message":"API is restarting. Retry in 15 seconds.","retry_after":15}';
    }

    location /.well-known/glama.json {
        alias /home/paperclip/buywhere-api/glama.json;
        add_header Content-Type application/json;
        add_header Cache-Control "public, max-age=86400";
    }

    # MCP JSON-RPC endpoint — BUY-6843/BUY-6886: no trailing slash on location to prevent
    # nginx's automatic 301 redirect that breaks tools/call for SDK clients.
    # Route to the verified Cloud Run runtime instead of the stale VM-local port 8000 app.
    location /mcp {
        proxy_pass https://buywhere-api-3cjo6zft4q-as.a.run.app;
        proxy_ssl_server_name on;
        proxy_ssl_name buywhere-api-3cjo6zft4q-as.a.run.app;
        proxy_set_header Host buywhere-api-3cjo6zft4q-as.a.run.app;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # Keep this local until the production Cloud Run service exposes the endpoint.
    # /.well-known/api-catalog — catalog manifest (UptimeRobot monitor)
    location /.well-known/api-catalog {
        proxy_pass http://express_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 10s;
    }

    # Keep this local until the production Cloud Run service exposes the endpoint.
    # /health/redis — Redis connectivity check (UptimeRobot monitor)
    location /health/redis {
        proxy_pass http://express_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 10s;
    }

    location / {
        proxy_pass https://buywhere-api-3cjo6zft4q-as.a.run.app;
        proxy_ssl_server_name on;
        proxy_ssl_name buywhere-api-3cjo6zft4q-as.a.run.app;
        proxy_set_header Host buywhere-api-3cjo6zft4q-as.a.run.app;
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
        # Retry on stale keepalive connections or transient upstream errors.
        # Covers the deploy-gap case: if the backend is briefly unreachable,
        # nginx retries up to 3 times over 8s before surfacing a 502.
        proxy_next_upstream error timeout http_502 http_503;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 8s;
    }
}
