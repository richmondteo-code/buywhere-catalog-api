# Nginx config fragments for .io domains
# Deployed into /etc/nginx/sites-enabled/ alongside api.buywhere.ai.conf
#
# All three .io domains redirect 301 to their .ai equivalents.
# This satisfies GEO crawler reachability without duplicating content.
#
# Prerequisites before deploying:
#   1. buywhere.io registered at a domain registrar
#   2. DNS A records created:
#        buywhere.io     -> 143.198.87.39
#        www.buywhere.io -> 143.198.87.39
#        api.buywhere.io -> 143.198.87.39
#        docs.buywhere.io -> 143.198.87.39
#   3. SSL certs issued via certbot:
#        certbot certonly --nginx \
#          -d buywhere.io -d www.buywhere.io \
#          -d api.buywhere.io -d docs.buywhere.io
#
# Reload nginx after deploy: sudo nginx -t && sudo systemctl reload nginx

# ── buywhere.io + www ──────────────────────────────────────────────────────────

server {
    listen 80;
    server_name buywhere.io www.buywhere.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://buywhere.io$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name www.buywhere.io;

    ssl_certificate /etc/letsencrypt/live/buywhere.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/buywhere.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://buywhere.ai$request_uri;
}

server {
    listen 443 ssl http2;
    server_name buywhere.io;

    ssl_certificate /etc/letsencrypt/live/buywhere.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/buywhere.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    return 301 https://buywhere.ai$request_uri;
}

