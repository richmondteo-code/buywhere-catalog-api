# buywhere.ai / www.buywhere.ai — Next.js site proxy
# Deployed by nginx-deploy.yml into /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name buywhere.ai www.buywhere.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name buywhere.ai www.buywhere.ai;

    ssl_certificate /etc/letsencrypt/live/buywhere.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/buywhere.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;
    client_body_timeout 60s;

    location = /openapi.json {
        return 308 https://api.buywhere.ai/openapi.json;
    }

    # Proxy API well-known paths to api.buywhere.ai
    location = /.well-known/agent.json {
        proxy_pass https://api.buywhere.ai/.well-known/agent.json;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host api.buywhere.ai;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /.well-known/jwks.json {
        proxy_pass https://api.buywhere.ai/.well-known/jwks.json;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host api.buywhere.ai;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MCP registry DNS auth proof (BUY-11299)
    location = /.well-known/mcp-registry-auth {
        proxy_pass https://api.buywhere.ai/.well-known/mcp-registry-auth;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host api.buywhere.ai;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MCP server discovery manifest
    location = /.well-known/mcp.json {
        proxy_pass https://api.buywhere.ai/.well-known/mcp.json;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host api.buywhere.ai;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3006;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
