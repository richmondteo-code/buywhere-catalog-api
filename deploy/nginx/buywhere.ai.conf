# buywhere.ai / www.buywhere.ai — Next.js site proxy
# Deployed by nginx-deploy.yml into /etc/nginx/sites-enabled/
#
# Content negotiation (Accept: text/markdown) and discovery Link headers are
# handled here in nginx rather than relying on Next.js middleware, so the
# behaviour is stable across keepalive connections and cached revisions.
#
# No upstream block here — proxy_pass uses the Cloud Run URL directly to avoid
# conflicts with any buywhere_site upstream that may already exist in nginx.conf.

server {
    listen 80;
    server_name buywhere.ai www.buywhere.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name buywhere.ai www.buywhere.ai;

    ssl_certificate /etc/letsencrypt/live/api.buywhere.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.buywhere.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;
    client_body_timeout 60s;

    # Common proxy variables — all location blocks use these.
    # proxy_set_header directives are inherited by nested if blocks.

    # ── Homepage (/): markdown negotiation + discovery Link headers ───────────────
    location = / {
        # Security headers (must repeat here; location add_header overrides server-level)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # AI agent / Cloudflare readiness discovery headers
        add_header Link '<https://buywhere.ai/llms.txt>; rel="describedby"; type="text/plain", <https://buywhere.ai/.well-known/api-catalog>; rel="service-desc"; type="application/json", <https://buywhere.ai/.well-known/mcp/server-card.json>; rel="service-desc"; type="application/json", <https://buywhere.ai/openapi.json>; rel="service-desc"; type="application/json"' always;

        # Content negotiation: rewrite URI before proxying so Cloud Run serves markdown
        if ($http_accept ~* "text/markdown") {
            rewrite ^ /index.md break;
        }

        proxy_pass https://buywhere-site-production-3cjo6zft4q-as.a.run.app;
        proxy_ssl_server_name on;
        proxy_ssl_name buywhere-site-production-3cjo6zft4q-as.a.run.app;
        proxy_set_header Host buywhere-site-production-3cjo6zft4q-as.a.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # ── Docs (/docs and /docs/): markdown negotiation + discovery Link headers ────
    location ~* ^/docs/?$ {
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # Discovery headers
        add_header Link '<https://buywhere.ai/llms.txt>; rel="describedby"; type="text/plain", <https://buywhere.ai/.well-known/api-catalog>; rel="service-desc"; type="application/json", <https://buywhere.ai/.well-known/mcp/server-card.json>; rel="service-desc"; type="application/json", <https://buywhere.ai/openapi.json>; rel="service-desc"; type="application/json"' always;

        # Content negotiation
        if ($http_accept ~* "text/markdown") {
            rewrite ^ /docs-md break;
        }

        proxy_pass https://buywhere-site-production-3cjo6zft4q-as.a.run.app;
        proxy_ssl_server_name on;
        proxy_ssl_name buywhere-site-production-3cjo6zft4q-as.a.run.app;
        proxy_set_header Host buywhere-site-production-3cjo6zft4q-as.a.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # ── OpenAPI redirect ──────────────────────────────────────────────────────────
    location = /openapi.json {
        return 308 https://api.buywhere.ai/openapi.json;
    }

    # ── LLM discovery files: serve directly from Cloud Run ───────────────────────
    location = /llms.txt {
        proxy_pass https://buywhere-site-production-3cjo6zft4q-as.a.run.app;
        proxy_ssl_server_name on;
        proxy_ssl_name buywhere-site-production-3cjo6zft4q-as.a.run.app;
        proxy_set_header Host buywhere-site-production-3cjo6zft4q-as.a.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        add_header Cache-Control "public, max-age=3600" always;
    }

    location = /llms-full.txt {
        proxy_pass https://buywhere-site-production-3cjo6zft4q-as.a.run.app;
        proxy_ssl_server_name on;
        proxy_ssl_name buywhere-site-production-3cjo6zft4q-as.a.run.app;
        proxy_set_header Host buywhere-site-production-3cjo6zft4q-as.a.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # ── Default: proxy everything else to Cloud Run ───────────────────────────────
    location / {
        proxy_pass https://buywhere-site-production-3cjo6zft4q-as.a.run.app;
        proxy_ssl_server_name on;
        proxy_ssl_name buywhere-site-production-3cjo6zft4q-as.a.run.app;
        proxy_set_header Host buywhere-site-production-3cjo6zft4q-as.a.run.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }

    # Security headers for catch-all location / (no add_header in that block,
    # so server-level directives apply here)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
