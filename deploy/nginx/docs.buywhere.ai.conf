# docs.buywhere.ai — docs subdomain proxied to main Next.js site
# Deployed by nginx-deploy.yml into /etc/nginx/sites-enabled/
#
# The main Next.js site serves /docs/ content on port 3006.
# This strips the /docs prefix so docs.buywhere.ai/ reads clean.

server {
    server_name docs.buywhere.ai;

    location / {
        proxy_pass http://127.0.0.1:3006/docs/;
        proxy_redirect /docs/ /;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 60s;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/docs.buywhere.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/docs.buywhere.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = docs.buywhere.ai) {
        return 301 https://$host$request_uri;
    }

    server_name docs.buywhere.ai;
    listen 80;
    return 404;
}
