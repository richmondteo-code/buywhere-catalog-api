apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: buywhere-mcp
  namespace: gaia-calendar-488606
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cloudsql-instances: "PROJECT_ID:asia-southeast1:buywhere-staging"
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 200
      timeoutSeconds: 10
      serviceAccountName: buywhere-api-sa@PROJECT_ID.iam.gserviceaccount.com
      containers:
        - image: asia-southeast1-docker.pkg.dev/PROJECT_ID/buywhere/api:IMAGE_TAG
          command: ["node", "dist/mcp-server.js"]
          ports:
            - containerPort: 8081
          env:
            - name: MCP_PORT
              value: "8081"
            - name: APP_BASE_URL
              value: "https://api.buywhere.ai"
            - name: API_BASE_URL
              value: "https://api.buywhere.ai"
            - name: PG_POOL_MAX
              value: "10"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: buywhere-db-url
                  key: latest
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: buywhere-redis-host
                  key: latest
            - name: REDIS_PORT
              value: "6379"
          resources:
            limits:
              cpu: "1"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 30
