apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: buywhere-api
  namespace: gaia-calendar-488606
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/launch-stage: GA
spec:
  template:
    metadata:
      annotations:
        # Min 1 instance to avoid cold-start latency penalty on first request
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        # Use Cloud SQL connection via Unix socket
        run.googleapis.com/cloudsql-instances: "PROJECT_ID:asia-southeast1:buywhere-staging"
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 100
      timeoutSeconds: 10
      serviceAccountName: buywhere-api-sa@PROJECT_ID.iam.gserviceaccount.com
      containers:
        - image: asia-southeast1-docker.pkg.dev/PROJECT_ID/buywhere/api:IMAGE_TAG
          command: ["node", "dist/index.js"]
          ports:
            - containerPort: 3000
          env:
            - name: API_BASE_URL
              value: "https://api.buywhere.ai"
            - name: PG_POOL_MAX
              value: "10"
            # Cloud SQL via Unix socket (PgBouncer not needed with Cloud SQL Proxy)
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: buywhere-db-url
                  key: latest
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: buywhere-redis-host
                  key: latest
            - name: REDIS_PORT
              value: "6379"
            - name: ADMIN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: buywhere-admin-api-key
                  key: latest
            - name: POSTHOG_API_KEY
              valueFrom:
                secretKeyRef:
                  name: buywhere-posthog-api-key
                  key: latest
            - name: PAPERCLIP_API_URL
              value: "http://gaia-agents-first.tail547291.ts.net:3100"
            - name: PAPERCLIP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: buywhere-paperclip-api-key
                  key: latest
            - name: UPTIMEROBOT_ISSUE_ID
              value: "0d3648af-2d05-4494-9ffe-0199de71cd57"
          resources:
            limits:
              cpu: "1"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
