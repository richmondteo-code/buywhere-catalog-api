[PARSER]
    Name              docker
    Format            json
    Time_Key          time
    Time_Format       %Y-%m-%dT%H:%M:%S.%L
    Time_Keep         On

[PARSER]
    Name              docker-container
    Format            json
    Time_Key          time
    Time_Format       %Y-%m-%dT%H:%M:%S.%L
    Time_Keep         On

[PARSER]
    Name              json
    Format            json
    Time_Key          timestamp
    Time_Format       %Y-%m-%dT%H:%M:%S.%LZ
    Time_Keep         On

[PARSER]
    Name              logfmt
    Format            logfmt

[PARSER]
    Name              syslog
    Format            regex
    Regex             ^<(?<pri>[0-9]+)>^(?<time>[^ ]+) (?<host>[^ ]+) (?<ident>[^ ]+?)(\[(?<pid>[0-9]+)\])?(?<message>.*)$
    Time_Key          time
    Time_Format       %b %d %H:%M:%S
    Types              pid:integer
