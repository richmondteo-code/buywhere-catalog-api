name: Deploy Python API to Production VM

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: false
        default: 'release'
        type: string

permissions:
  contents: read

env:
  APP_DIR: /srv/buywhere-api

jobs:
  deploy:
    name: Deploy to Production VM
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_DEPLOY_SSH_KEY }}

      - name: Trust production host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.PRODUCTION_DEPLOY_PORT || 22 }}" -H "${{ secrets.PRODUCTION_DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Pull, migrate, restart
        env:
          DEPLOY_HOST: ${{ secrets.PRODUCTION_DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.PRODUCTION_DEPLOY_PORT || 22 }}
          DEPLOY_USER: ${{ secrets.PRODUCTION_DEPLOY_USER }}
          BRANCH: ${{ inputs.branch || 'release' }}
        run: |
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "BRANCH=$BRANCH bash -s" << 'ENDSSH'
            set -euo pipefail
            echo "=== BuyWhere Python API deploy starting ==="

            # Find the app directory
            APP_DIR=""
            for candidate in /srv/buywhere-api /srv/buywhere /opt/buywhere-api /opt/buywhere /home/ubuntu/buywhere /home/buywhere /tmp/buywhere-release; do
              if [ -f "$candidate/app/main.py" ]; then
                APP_DIR="$candidate"
                break
              fi
            done

            if [ -z "$APP_DIR" ]; then
              echo "ERROR: Could not find app/main.py in any candidate directory"
              exit 1
            fi
            echo "App directory: $APP_DIR"

            cd "$APP_DIR"

            # Pull latest code
            echo "=== git pull origin $BRANCH ==="
            git fetch origin
            git checkout "$BRANCH"
            git pull origin "$BRANCH"
            echo "HEAD: $(git log --oneline -1)"

            # Run any pending Alembic migrations
            echo "=== alembic upgrade head ==="
            if command -v alembic &>/dev/null; then
              alembic upgrade head
            elif [ -f ".venv/bin/alembic" ]; then
              .venv/bin/alembic upgrade head
            elif [ -f "venv/bin/alembic" ]; then
              venv/bin/alembic upgrade head
            elif [ -f "${APP_DIR}/venv/bin/alembic" ]; then
              "${APP_DIR}/venv/bin/alembic" upgrade head
            else
              echo "WARNING: alembic not found in PATH or venv — skipping migration"
            fi

            # Restart service
            echo "=== restarting service ==="
            if systemctl list-unit-files 2>/dev/null | grep -qE 'buywhere-api|buywhere\.service'; then
              SERVICE=$(systemctl list-units --type=service --all 2>/dev/null | grep -iE 'buywhere-api|buywhere' | awk '{print $1}' | head -1)
              echo "Restarting systemd service: $SERVICE"
              systemctl restart "$SERVICE"
              sleep 3
              systemctl is-active "$SERVICE" && echo "Service is active" || echo "WARNING: service may not be running"
            elif command -v supervisorctl &>/dev/null && supervisorctl status 2>/dev/null | grep -qiE 'buywhere|uvicorn'; then
              PROC=$(supervisorctl status | grep -iE 'buywhere|uvicorn' | awk '{print $1}' | head -1)
              echo "Restarting supervisor process: $PROC"
              supervisorctl restart "$PROC"
            elif command -v pm2 &>/dev/null && pm2 list 2>/dev/null | grep -qiE 'buywhere|api'; then
              PROC=$(pm2 list | grep -iE 'buywhere|api' | awk '{print $2}' | head -1)
              echo "Restarting PM2 process: $PROC"
              pm2 restart "$PROC"
            elif command -v docker &>/dev/null && [ -f "${APP_DIR}/Dockerfile" ]; then
              echo "No service manager found — using Docker-based deploy"

              # Find the container currently bound to port 8000 (the API slot)
              EXISTING=$(docker ps -q --filter "publish=8000" 2>/dev/null | head -1)
              [ -z "$EXISTING" ] && EXISTING=$(docker ps -q --filter "name=buywhere-api-api-1" 2>/dev/null | head -1)
              [ -z "$EXISTING" ] && EXISTING=$(docker ps -q --filter "name=working-api" 2>/dev/null | head -1)

              # Build the Python API image
              echo "Building Python API image from ${APP_DIR}..."
              docker build -t buywhere-python-api:deploy "${APP_DIR}" 2>&1 | tail -10

              # Capture run config from existing container (networks, env, restart policy)
              if [ -n "$EXISTING" ]; then
                OLD_NAME=$(docker inspect "$EXISTING" --format '{{.Name}}' | sed 's|^/||')
                docker inspect "$EXISTING" --format '{{json .Config.Env}}' \
                  | python3 -c "import json,sys; [print(e) for e in json.load(sys.stdin)]" > /tmp/api-env-swap.txt
                NETS=$(docker inspect "$EXISTING" --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}} {{end}}')
                RESTART_POL=$(docker inspect "$EXISTING" --format '{{.HostConfig.RestartPolicy.Name}}')
                [ -z "$RESTART_POL" ] || [ "$RESTART_POL" = "no" ] && RESTART_POL="unless-stopped"
                docker stop "$EXISTING" || true
                docker rm "$EXISTING" || true
              else
                OLD_NAME="buywhere-api"
                NETS="buywhere_default"
                RESTART_POL="unless-stopped"
                echo "" > /tmp/api-env-swap.txt
              fi

              # Supplement env from APP_DIR/.env if present
              if [ -f "${APP_DIR}/.env" ]; then
                while IFS= read -r line || [ -n "$line" ]; do
                  [[ "$line" =~ ^[[:space:]]*# ]] && continue
                  [[ -z "${line// /}" ]] && continue
                  varname="${line%%=*}"
                  grep -q "^${varname}=" /tmp/api-env-swap.txt 2>/dev/null || echo "$line" >> /tmp/api-env-swap.txt
                done < "${APP_DIR}/.env"
              fi

              NETWORK_FLAGS=""
              for net in $NETS; do
                NETWORK_FLAGS="${NETWORK_FLAGS} --network ${net}"
              done
              [ -z "${NETWORK_FLAGS// /}" ] && NETWORK_FLAGS="--network buywhere_default"

              echo "Starting Python API container: name=${OLD_NAME} restart=${RESTART_POL}"
              # shellcheck disable=SC2086
              docker run -d \
                --name "$OLD_NAME" \
                --env-file /tmp/api-env-swap.txt \
                ${NETWORK_FLAGS} \
                -p 8000:8000 \
                --restart "${RESTART_POL}" \
                buywhere-python-api:deploy
              rm -f /tmp/api-env-swap.txt
              echo "Python API container started"
            else
              echo "WARNING: Could not detect service manager — service must be restarted manually"
            fi

            echo "=== Deploy complete ==="
          ENDSSH

      - name: Health check
        env:
          DEPLOY_HOST: ${{ secrets.PRODUCTION_DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.PRODUCTION_DEPLOY_PORT || 22 }}
          DEPLOY_USER: ${{ secrets.PRODUCTION_DEPLOY_USER }}
        run: |
          echo "Waiting 10s for service to come up..."
          sleep 10
          # Check health endpoint
          for i in 1 2 3 4 5; do
            HTTP=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 https://api.buywhere.ai/health || echo "000")
            if [ "$HTTP" = "200" ]; then
              echo "Health check passed (attempt $i) — HTTP $HTTP"
              exit 0
            fi
            echo "Health check attempt $i: HTTP $HTTP"
            sleep 5
          done
          echo "WARNING: Health check did not return 200 — check service manually"
          exit 1
