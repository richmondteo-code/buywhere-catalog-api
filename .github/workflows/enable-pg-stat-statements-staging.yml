name: Enable pg_stat_statements (Staging)

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: read

env:
  GCP_PROJECT_ID: gaia-calendar-488606
  GCP_REGION: asia-southeast1
  CLOUD_SQL_INSTANCE: buywhere-staging
  INSTANCE_CONNECTION_NAME: gaia-calendar-488606:asia-southeast1:buywhere-staging
  TEMP_PASSWORD: "TempPassBuywhere!"

jobs:
  enable-pg-stat-statements:
    name: Enable pg_stat_statements on Cloud SQL Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Disable IAM authentication
        run: |
          echo "Disabling IAM authentication to use password auth..."
          gcloud sql instances patch ${{ env.CLOUD_SQL_INSTANCE }} \
            --database-flags=cloudsql.iam_authentication=off \
            --project=${{ env.GCP_PROJECT_ID }} || true
          sleep 5

      - name: Reset postgres password to known temp value
        run: |
          echo "Setting temporary postgres password..."
          gcloud sql users set-password postgres \
            --instance=${{ env.CLOUD_SQL_INSTANCE }} \
            --password="${{ env.TEMP_PASSWORD }}" \
            --project=${{ env.GCP_PROJECT_ID }}

      - name: Download Cloud SQL Proxy
        run: |
          PROXY_DIR=/tmp/cloud_sql
          mkdir -p $PROXY_DIR
          echo "Downloading Cloud SQL Proxy..."
          curl -s -o $PROXY_DIR/cloud_sql_proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/2.8.0/cloud-sql-proxy.linux.amd64
          chmod +x $PROXY_DIR/cloud_sql_proxy
          echo "Proxy downloaded:"
          ls -la $PROXY_DIR/

      - name: Get GCP credentials file path
        id: gcp-creds
        run: |
          echo "Finding GCP credentials file..."
          CREDS_FILE=$(find /home -name "*.json" -path "*gcloud*" 2>/dev/null | head -1 || echo "")
          if [ -z "$CREDS_FILE" ]; then
            # Try the standard location from google-github-actions
            CREDS_FILE="/github/home/.config/gcloud/application_default_credentials.json"
          fi
          echo "Using credentials: $CREDS_FILE"
          echo "creds_file=$CREDS_FILE" >> $GITHUB_OUTPUT

      - name: Start Cloud SQL Proxy
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.gcp-creds.outputs.creds_file }}
        run: |
          PROXY_DIR=/tmp/cloud_sql
          echo "Starting Cloud SQL Proxy with credentials..."
          echo "Credentials file: $GOOGLE_APPLICATION_CREDENTIALS"
          $PROXY_DIR/cloud_sql_proxy \
            --dir=$PROXY_DIR \
            --instances=${{ env.INSTANCE_CONNECTION_NAME }}=tcp:5432 \
            --credential_file=$GOOGLE_APPLICATION_CREDENTIALS \
            &
          echo "Waiting for proxy to start..."
          sleep 15
          ls -la $PROXY_DIR/
          # Check if proxy is listening
          netstat -tlnp 2>/dev/null || ss -tlnp 2>/dev/null || echo "Checking proxy process..."
          ps aux | grep cloud_sql_proxy | grep -v grep || echo "Proxy not running"

      - name: Enable pg_stat_statements
        run: |
          echo "Enabling pg_stat_statements..."
          echo "Testing connection..."
          PGPASSWORD="${{ env.TEMP_PASSWORD }}" psql \
            -h 127.0.0.1 -p 5432 \
            -U postgres \
            -d postgres \
            -c "SELECT 1;" || echo "Connection test failed"
          echo "Creating extension..."
          PGPASSWORD="${{ env.TEMP_PASSWORD }}" psql \
            -h 127.0.0.1 -p 5432 \
            -U postgres \
            -d postgres \
            -c "CREATE EXTENSION IF NOT EXISTS pg_stat_statements;"

      - name: Verify pg_stat_statements is enabled
        run: |
          echo "Verifying pg_stat_statements..."
          PGPASSWORD="${{ env.TEMP_PASSWORD }}" psql \
            -h 127.0.0.1 -p 5432 \
            -U postgres \
            -d postgres \
            -c "SELECT query, calls, total_exec_time, mean_exec_time FROM pg_stat_statements ORDER BY mean_exec_time DESC LIMIT 10;"

      - name: Reset postgres password back to random
        run: |
          RANDOM_PASS=$(openssl rand -base64 24)
          echo "Resetting postgres password to random value..."
          gcloud sql users set-password postgres \
            --instance=${{ env.CLOUD_SQL_INSTANCE }} \
            --password="$RANDOM_PASS" \
            --project=${{ env.GCP_PROJECT_ID }}