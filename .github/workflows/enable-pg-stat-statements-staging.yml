name: Enable pg_stat_statements (Staging)

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: read

env:
  GCP_PROJECT_ID: gaia-calendar-488606
  GCP_REGION: asia-southeast1
  CLOUD_SQL_INSTANCE: buywhere-staging

jobs:
  enable-pg-stat-statements:
    name: Enable pg_stat_statements on Cloud SQL Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Enable IAM authentication for Cloud SQL
        run: |
          echo "Enabling IAM authentication on Cloud SQL instance..."
          gcloud sql instances patch ${{ env.CLOUD_SQL_INSTANCE }} \
            --database-flags=cloudsql.iam_authentication=on \
            --project=${{ env.GCP_PROJECT_ID }}

      - name: Get access token and service account email
        id: get-token
        run: |
          TOKEN=$(gcloud auth print-access-token)
          SA_EMAIL=$(gcloud auth list --filter=status:ACTIVE --format='value(account)')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT
          echo "sa_email=$SA_EMAIL" >> $GITHUB_OUTPUT
          echo "Service account: $SA_EMAIL"

      - name: List existing Cloud SQL users
        run: |
          echo "Existing Cloud SQL users:"
          curl -s -X POST \
            "https://sqladmin.googleapis.com/v1/projects/${{ env.GCP_PROJECT_ID }}/instances/${{ env.CLOUD_SQL_INSTANCE }}/executeSql" \
            -H "Authorization: Bearer ${{ steps.get-token.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d '{"sqlStatement": "SELECT usename FROM pg_user;"}' | jq .

      - name: Create service account PostgreSQL user
        run: |
          echo "Creating IAM-authenticated user for: ${{ steps.get-token.outputs.sa_email }}"
          curl -X POST \
            "https://sqladmin.googleapis.com/v1/projects/${{ env.GCP_PROJECT_ID }}/instances/${{ env.CLOUD_SQL_INSTANCE }}/executeSql" \
            -H "Authorization: Bearer ${{ steps.get-token.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d "{\"sqlStatement\": \"DO \$\$ BEGIN CREATE USER \\\"${{ steps.get-token.outputs.sa_email }}\\\" WITH CREATEROLE; EXCEPTION WHEN duplicate_object THEN NULL; END \$\$;\"}"

      - name: Grant IAM user necessary roles
        run: |
          echo "Granting necessary roles to IAM user: ${{ steps.get-token.outputs.sa_email }}"
          curl -X POST \
            "https://sqladmin.googleapis.com/v1/projects/${{ env.GCP_PROJECT_ID }}/instances/${{ env.CLOUD_SQL_INSTANCE }}/executeSql" \
            -H "Authorization: Bearer ${{ steps.get-token.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d "{\"sqlStatement\": \"GRANT ALL PRIVILEGES ON DATABASE postgres TO \\\"${{ steps.get-token.outputs.sa_email }}\\\";\"}"

      - name: Enable pg_stat_statements extension
        run: |
          echo "Enabling pg_stat_statements extension..."
          curl -X POST \
            "https://sqladmin.googleapis.com/v1/projects/${{ env.GCP_PROJECT_ID }}/instances/${{ env.CLOUD_SQL_INSTANCE }}/executeSql" \
            -H "Authorization: Bearer ${{ steps.get-token.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d '{"sqlStatement": "CREATE EXTENSION IF NOT EXISTS pg_stat_statements;"}'

      - name: Verify pg_stat_statements is enabled
        run: |
          echo "Verifying pg_stat_statements..."
          curl -X POST \
            "https://sqladmin.googleapis.com/v1/projects/${{ env.GCP_PROJECT_ID }}/instances/${{ env.CLOUD_SQL_INSTANCE }}/executeSql" \
            -H "Authorization: Bearer ${{ steps.get-token.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d '{"sqlStatement": "SELECT query, calls, mean_time, total_time FROM pg_stat_statements ORDER BY mean_time DESC LIMIT 10;"}' | jq .
