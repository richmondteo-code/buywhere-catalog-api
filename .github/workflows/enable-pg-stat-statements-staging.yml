name: Enable pg_stat_statements (Staging)

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: read

env:
  GCP_PROJECT_ID: gaia-calendar-488606
  GCP_REGION: asia-southeast1
  CLOUD_SQL_INSTANCE: buywhere-staging
  INSTANCE_CONNECTION_NAME: gaia-calendar-488606:asia-southeast1:buywhere-staging
  TEMP_PASSWORD: "TempPassBuywhere!"

jobs:
  enable-pg-stat-statements:
    name: Enable pg_stat_statements on Cloud SQL Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Disable IAM authentication
        run: |
          echo "Disabling IAM authentication to use password auth..."
          gcloud sql instances patch ${{ env.CLOUD_SQL_INSTANCE }} \
            --database-flags=cloudsql.iam_authentication=off \
            --project=${{ env.GCP_PROJECT_ID }} || true
          sleep 5

      - name: Reset postgres password to known temp value
        run: |
          echo "Setting temporary postgres password..."
          gcloud sql users set-password postgres \
            --instance=${{ env.CLOUD_SQL_INSTANCE }} \
            --password="${{ env.TEMP_PASSWORD }}" \
            --project=${{ env.GCP_PROJECT_ID }}

      - name: Install Cloud SQL Proxy
        run: |
          echo "Installing Cloud SQL Proxy..."
          gcloud components install cloud_sql_proxy --quiet

      - name: Start Cloud SQL Proxy
        run: |
          PROXY_DIR=/tmp/cloud_sql
          mkdir -p $PROXY_DIR
          echo "Starting Cloud SQL Proxy..."
          PROXY_VERSION=$(gcloud components list --format=json 2>/dev/null | python3 -c "import sys,json; ver=[c['version'] for c in json.load(sys.stdin).get('components',[]) if c['id']=='cloud_sql_proxy']; print(ver[0] if ver else '258.0.0')")
          echo "Using cloud_sql_proxy version: $PROXY_VERSION"
          /opt/hostedtoolcache/gcloud/$PROXY_VERSION/x64/bin/cloud_sql_proxy \
            --dir=$PROXY_DIR \
            --instances=${{ env.INSTANCE_CONNECTION_NAME }}=tcp:5432 \
            &
          echo "Waiting for proxy to start..."
          sleep 20
          ls -la $PROXY_DIR/

      - name: Enable pg_stat_statements
        run: |
          echo "Enabling pg_stat_statements..."
          PGPASSWORD="${{ env.TEMP_PASSWORD }}" psql \
            -h 127.0.0.1 -p 5432 \
            -U postgres \
            -d postgres \
            -c "CREATE EXTENSION IF NOT EXISTS pg_stat_statements;"

      - name: Verify pg_stat_statements is enabled
        run: |
          echo "Verifying pg_stat_statements..."
          PGPASSWORD="${{ env.TEMP_PASSWORD }}" psql \
            -h 127.0.0.1 -p 5432 \
            -U postgres \
            -d postgres \
            -c "SELECT query, calls, mean_time, total_time FROM pg_stat_statements ORDER BY mean_time DESC LIMIT 10;"

      - name: Reset postgres password back to random
        run: |
          RANDOM_PASS=$(openssl rand -base64 24)
          echo "Resetting postgres password to random value..."
          gcloud sql users set-password postgres \
            --instance=${{ env.CLOUD_SQL_INSTANCE }} \
            --password="$RANDOM_PASS" \
            --project=${{ env.GCP_PROJECT_ID }}