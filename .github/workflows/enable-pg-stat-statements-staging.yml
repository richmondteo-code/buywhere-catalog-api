name: Enable pg_stat_statements (Staging)

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

env:
  GCP_PROJECT_ID: gaia-calendar-488606
  GCP_REGION: asia-southeast1
  CLOUD_SQL_INSTANCE: buywhere-staging:asia-southeast1:buywhere-db

jobs:
  enable-pg-stat-statements:
    name: Enable pg_stat_statements on Cloud SQL Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get Cloud SQL instance connection name
        id: connection
        run: |
          CONNECTION_NAME=$(gcloud sql instances describe buywhere-staging --format="value(connectionName)")
          echo "connection_name=${CONNECTION_NAME}" >> $GITHUB_OUTPUT

      - name: Start Cloud SQL Proxy with IAM auth
        run: |
          /opt/hostedtoolcache/gcloud/564.0.0/x64/bin/cloud-sql-proxy --port 5432 --iam "${{ steps.connection.outputs.connection_name }}" &
          sleep 5
          echo "Proxy started"

      - name: Enable pg_stat_statements extension
        run: |
          PGPASSWORD= psql -h 127.0.0.1 -p 5432 -U postgres -d postgres -c "CREATE EXTENSION IF NOT EXISTS pg_stat_statements;"

      - name: Verify pg_stat_statements is enabled
        run: |
          PGPASSWORD= psql -h 127.0.0.1 -p 5432 -U postgres -d postgres -c "SELECT query, calls, mean_time, total_time FROM pg_stat_statements ORDER BY mean_time DESC LIMIT 10;"