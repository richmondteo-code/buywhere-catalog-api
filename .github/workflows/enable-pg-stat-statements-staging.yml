name: Enable pg_stat_statements (Staging)

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

env:
  GCP_PROJECT_ID: gaia-calendar-488606
  GCP_REGION: asia-southeast1
  CLOUD_SQL_INSTANCE: buywhere-staging:asia-southeast1:buywhere-db

jobs:
  enable-pg-stat-statements:
    name: Enable pg_stat_statements on Cloud SQL Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get access token
        id: token
        run: |
          TOKEN=$(gcloud auth print-access-token)
          echo "token=${TOKEN}" >> $GITHUB_OUTPUT

      - name: Get instance details
        id: instance
        run: |
          INSTANCE_DATA=$(gcloud sql instances describe buywhere-staging --format=json)
          echo "$INSTANCE_DATA"
          INSTANCE_NAME=$(echo "$INSTANCE_DATA" | jq -r '.name')
          echo "instance_name=${INSTANCE_NAME}" >> $GITHUB_OUTPUT

      - name: Enable Data API access
        run: |
          curl -X PATCH \
            -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
            -H "Content-Type: application/json" \
            -d '{"settings": {"dataApiAccess": "ALLOW_DATA_API"}}' \
            "https://sqladmin.googleapis.com/v1/projects/${GCP_PROJECT_ID}/instances/${{ steps.instance.outputs.instance_name }}"

      - name: Enable pg_stat_statements extension
        run: |
          gcloud sql instances execute-sql buywhere-staging --database=postgres --sql="CREATE EXTENSION IF NOT EXISTS pg_stat_statements;"

      - name: Verify pg_stat_statements is enabled
        run: |
          gcloud sql instances execute-sql buywhere-staging --database=postgres --sql="SELECT query, calls, mean_time, total_time FROM pg_stat_statements ORDER BY mean_time DESC LIMIT 10;"