name: Enable pg_stat_statements (Staging)

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

env:
  GCP_PROJECT_ID: gaia-calendar-488606
  GCP_REGION: asia-southeast1
  CLOUD_SQL_INSTANCE: buywhere-staging:asia-southeast1:buywhere-db

jobs:
  enable-pg-stat-statements:
    name: Enable pg_stat_statements on Cloud SQL Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Disable IAM authentication
        run: |
          gcloud sql instances patch buywhere-staging --database-flags=cloudsql.iam_authentication=off

      - name: Install Cloud SQL Proxy
        run: gcloud components install cloud_sql_proxy --quiet

      - name: Extract password and start proxy
        env:
          CONNECTION_STRING: ${{ secrets.CLOUD_SQL_STAGING_CONNECTION_STRING }}
        run: |
          echo "Connection string: ${CONNECTION_STRING:0:30}..."
          # Parse connection string to extract components
          # Format: postgresql://user:password@host:port/database
          PROXY_SOCKET_DIR=/tmp/cloud_sql
          mkdir -p $PROXY_SOCKET_DIR
          /opt/hostedtoolcache/gcloud/564.0.0/x64/bin/cloud_sql_proxy \
            --dir=$PROXY_SOCKET_DIR \
            --instances=${{ env.CLOUD_SQL_INSTANCE }}=tcp:5432 \
            --credential_file=/home/runner/work/_gcp_token \
            &
          echo "Waiting for proxy to start..."
          sleep 10

      - name: Enable pg_stat_statements extension
        env:
          CONNECTION_STRING: ${{ secrets.CLOUD_SQL_STAGING_CONNECTION_STRING }}
        run: |
          # Extract password from connection string
          PASSWORD=$(echo "$CONNECTION_STRING" | sed -n 's/.*:\/\/[^:]*:\([^@]*\)@.*/\1/p')
          echo "Connecting to database..."
          PGPASSWORD=$PASSWORD psql -h 127.0.0.1 -p 5432 -U postgres -d postgres -c "CREATE EXTENSION IF NOT EXISTS pg_stat_statements;"

      - name: Verify pg_stat_statements is enabled
        env:
          CONNECTION_STRING: ${{ secrets.CLOUD_SQL_STAGING_CONNECTION_STRING }}
        run: |
          PASSWORD=$(echo "$CONNECTION_STRING" | sed -n 's/.*:\/\/[^:]*:\([^@]*\)@.*/\1/p')
          PGPASSWORD=$PASSWORD psql -h 127.0.0.1 -p 5432 -U postgres -d postgres -c "SELECT query, calls, mean_time, total_time FROM pg_stat_statements ORDER BY mean_time DESC LIMIT 10;"
