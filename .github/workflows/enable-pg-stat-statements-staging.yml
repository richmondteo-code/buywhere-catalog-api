name: Enable pg_stat_statements (Staging)

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: read

env:
  GCP_PROJECT_ID: gaia-calendar-488606
  GCP_REGION: asia-southeast1
  CLOUD_SQL_INSTANCE: buywhere-staging
  TEMP_PASSWORD: "TempPassBuywhere!"

jobs:
  enable-pg-stat-statements:
    name: Enable pg_stat_statements on Cloud SQL Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Disable IAM authentication
        run: |
          echo "Disabling IAM authentication to use password auth..."
          gcloud sql instances patch ${{ env.CLOUD_SQL_INSTANCE }} \
            --database-flags=cloudsql.iam_authentication=off \
            --project=${{ env.GCP_PROJECT_ID }} || true

      - name: Reset postgres password to known temp value
        run: |
          echo "Setting temporary postgres password..."
          gcloud sql users set-password postgres \
            --instance=${{ env.CLOUD_SQL_INSTANCE }} \
            --password="${{ env.TEMP_PASSWORD }}" \
            --project=${{ env.GCP_PROJECT_ID }}

      - name: Enable pg_stat_statements via expect
        run: |
          apt-get update -qq && apt-get install -y -qq expect > /dev/null 2>&1
          echo 'spawn gcloud sql connect '${{ env.CLOUD_SQL_INSTANCE }}' --user=postgres --quiet
          expect "Password:"
          send "'${{ env.TEMP_PASSWORD }}'\r"
          expect eof
          catch wait result
          exit [lindex $result 3]' > /tmp/connect.exp
          chmod +x /tmp/connect.exp
          echo "CREATE EXTENSION IF NOT EXISTS pg_stat_statements;" | cat > /tmp/enable.sql
          expect /tmp/connect.exp < /tmp/enable.sql

      - name: Verify pg_stat_statements is enabled
        run: |
          apt-get update -qq && apt-get install -y -qq expect > /dev/null 2>&1 || true
          echo 'spawn gcloud sql connect '${{ env.CLOUD_SQL_INSTANCE }}' --user=postgres --quiet
          expect "Password:"
          send "'${{ env.TEMP_PASSWORD }}'\r"
          expect eof
          catch wait result
          exit [lindex $result 3]' > /tmp/connect.exp
          chmod +x /tmp/connect.exp
          echo "SELECT query, calls, mean_time, total_time FROM pg_stat_statements ORDER BY mean_time DESC LIMIT 10;" | cat > /tmp/verify.sql
          expect /tmp/connect.exp < /tmp/verify.sql

      - name: Reset postgres password back to random
        run: |
          RANDOM_PASS=$(openssl rand -base64 24)
          echo "Resetting postgres password to random value..."
          gcloud sql users set-password postgres \
            --instance=${{ env.CLOUD_SQL_INSTANCE }} \
            --password="$RANDOM_PASS" \
            --project=${{ env.GCP_PROJECT_ID }}