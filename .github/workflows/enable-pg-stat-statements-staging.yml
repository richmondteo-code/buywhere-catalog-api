name: Enable pg_stat_statements (Staging)

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: read

env:
  GCP_PROJECT_ID: gaia-calendar-488606
  GCP_REGION: asia-southeast1
  CLOUD_SQL_INSTANCE: buywhere-staging:asia-southeast1:buywhere-db

jobs:
  enable-pg-stat-statements:
    name: Enable pg_stat_statements on Cloud SQL Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Get instance details
        id: instance
        run: |
          INSTANCE_DATA=$(gcloud sql instances describe buywhere-staging --format=json)
          echo "INSTANCE_DATA=$INSTANCE_DATA"
          INSTANCE_NAME=$(echo "$INSTANCE_DATA" | jq -r '.name')
          echo "instance_name=${INSTANCE_NAME}" >> $GITHUB_OUTPUT
          echo "Full instance data saved to instance_data.json"

      - name: Debug instance name
        run: |
          echo "Instance name from step: ${{ steps.instance.outputs.instance_name }}"
          curl -s -H "Authorization: Bearer $(gcloud auth print-access-token)" \
            "https://sqladmin.googleapis.com/v1/projects/${GCP_PROJECT_ID}/instances/${{ steps.instance.outputs.instance_name }}" | jq '.'

      - name: Enable Data API access
        run: |
          curl -v -X PATCH \
            -H "Authorization: Bearer $(gcloud auth print-access-token)" \
            -H "Content-Type: application/json" \
            -d '{"settings": {"dataApiAccess": "ALLOW_DATA_API"}}' \
            "https://sqladmin.googleapis.com/v1/projects/${GCP_PROJECT_ID}/instances/${{ steps.instance.outputs.instance_name }}" 2>&1 | tail -20

      - name: Wait for Data API enable to propagate
        run: sleep 10

      - name: Enable pg_stat_statements extension via Data API
        run: |
          curl -X POST \
            -H "Authorization: Bearer $(gcloud auth print-access-token)" \
            -H "Content-Type: application/json" \
            -d '{"sql":"CREATE EXTENSION IF NOT EXISTS pg_stat_statements;"}' \
            "https://sqladmin.googleapis.com/v1/projects/${GCP_PROJECT_ID}/instances/${{ steps.instance.outputs.instance_name }}:execute"

      - name: Verify pg_stat_statements is enabled
        run: |
          curl -X POST \
            -H "Authorization: Bearer $(gcloud auth print-access-token)" \
            -H "Content-Type: application/json" \
            -d '{"sql":"SELECT query, calls, mean_time, total_time FROM pg_stat_statements ORDER BY mean_time DESC LIMIT 10;"}' \
            "https://sqladmin.googleapis.com/v1/projects/${GCP_PROJECT_ID}/instances/${{ steps.instance.outputs.instance_name }}:execute"