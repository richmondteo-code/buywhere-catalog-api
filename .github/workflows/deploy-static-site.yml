name: Deploy Static Site to Production

on:
  push:
    branches:
      - master
    paths:
      - 'site/**'
      - 'website/**'
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip build step (use pre-built dist)'
        required: false
        default: 'false'
        type: boolean
      website_only:
        description: 'Deploy website/ only (marketing site)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: static-site-deploy
  cancel-in-progress: true

permissions:
  contents: read

env:
  DEPLOY_ROOT: /srv/buywhere-site
  SERVER_PATH: ${{ secrets.PRODUCTION_DEPLOY_USER }}@${{ secrets.PRODUCTION_DEPLOY_HOST }}

jobs:
  build:
    name: Build Static Site
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_build != 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -q jinja2 markdown

      - name: Build site
        working-directory: site
        run: python build.py

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: site/dist/
          retention-days: 1

  deploy:
    name: Deploy Docs Site (site/) to Production
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event.inputs.skip_build != 'true' && github.event.inputs.website_only != 'true' }}
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: site/dist/

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_DEPLOY_SSH_KEY }}

      - name: Trust production host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.PRODUCTION_DEPLOY_PORT || 22 }}" -H "${{ secrets.PRODUCTION_DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy site/ to server
        env:
          DEPLOY_HOST: ${{ secrets.PRODUCTION_DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.PRODUCTION_DEPLOY_PORT || 22 }}
          DEPLOY_USER: ${{ secrets.PRODUCTION_DEPLOY_USER }}
        run: |
          rsync -avz --delete \
            -e "ssh -p $DEPLOY_PORT" \
            --exclude '.git' \
            --exclude 'node_modules' \
            site/dist/ \
            $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_ROOT/site/

      - name: Verify deployment
        run: |
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" "https://buywhere.ai/" --max-time 10 --retry 2 2>/dev/null || echo "000")
          if [[ "$HTTP_CODE" == "200" ]]; then
            echo "Health check passed (HTTP $HTTP_CODE)"
          else
            echo "WARNING: Health check returned HTTP $HTTP_CODE"
          fi

  deploy-website:
    name: Deploy Marketing Site (website/) to Production
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.website_only == 'true' }}
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_DEPLOY_SSH_KEY }}

      - name: Trust production host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.PRODUCTION_DEPLOY_PORT || 22 }}" -H "${{ secrets.PRODUCTION_DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy website/ to server root
        env:
          DEPLOY_HOST: ${{ secrets.PRODUCTION_DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.PRODUCTION_DEPLOY_PORT || 22 }}
          DEPLOY_USER: ${{ secrets.PRODUCTION_DEPLOY_USER }}
        run: |
          rsync -avz --delete \
            -e "ssh -p $DEPLOY_PORT" \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'vercel.json' \
            website/ \
            $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_ROOT/

      - name: Verify deployment
        run: |
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" "https://buywhere.ai/" --max-time 10 --retry 2 2>/dev/null || echo "000")
          if [[ "$HTTP_CODE" == "200" ]]; then
            echo "Health check passed (HTTP $HTTP_CODE)"
          else
            echo "WARNING: Health check returned HTTP $HTTP_CODE"
          fi

  deploy-skip-build:
    name: Deploy to Production (skip build)
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_build == 'true' }}
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_DEPLOY_SSH_KEY }}

      - name: Trust production host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.PRODUCTION_DEPLOY_PORT || 22 }}" -H "${{ secrets.PRODUCTION_DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy site to server
        env:
          DEPLOY_HOST: ${{ secrets.PRODUCTION_DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.PRODUCTION_DEPLOY_PORT || 22 }}
          DEPLOY_USER: ${{ secrets.PRODUCTION_DEPLOY_USER }}
        run: |
          rsync -avz --delete \
            -e "ssh -p $DEPLOY_PORT" \
            --exclude '.git' \
            --exclude 'node_modules' \
            site/dist/ \
            $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_ROOT/site/

      - name: Verify deployment
        run: |
          HTTP_CODE=$(curl -sf -o /dev/null -w "%{http_code}" "https://buywhere.ai/" --max-time 10 --retry 2 2>/dev/null || echo "000")
          if [[ "$HTTP_CODE" == "200" ]]; then
            echo "Health check passed (HTTP $HTTP_CODE)"
          else
            echo "WARNING: Health check returned HTTP $HTTP_CODE)"
          fi
