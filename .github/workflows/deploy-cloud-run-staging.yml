name: Deploy to Cloud Run (Staging)

on:
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip smoke tests'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  GCP_PROJECT_ID: gaia-calendar-488606
  GCP_REGION: asia-southeast1
  CLOUD_RUN_SERVICE: buywhere-api
  CLOUD_SQL_INSTANCE: buywhere-staging:asia-southeast1:buywhere-db

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ghcr.io/buywhere/buywhere:sha-${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase repository name
        run: echo "LOWER_REPO=buywhere/buywhere" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/buywhere/buywhere
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ env.LOWER_REPO }}:sha-${{ github.sha }}
            ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-cloud-run:
    name: Deploy to Cloud Run Staging
    needs: build
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for GHCR and Artifact Registry
        run: |
          gcloud auth configure-docker ghcr.io --quiet
          gcloud auth configure-docker asia-southeast1-docker.pkg.dev --quiet

      - name: Pull GHCR image and retag for Artifact Registry
        run: |
          echo "=== Pulling image ==="
          docker pull ghcr.io/buywhere/buywhere:sha-${{ github.sha }} || { echo "Docker pull failed!"; exit 1; }
          echo "=== Tagging for GAR ==="
          AR_IMAGE="asia-southeast1-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/buywhere/${{ env.CLOUD_RUN_SERVICE }}:sha-${{ github.sha }}"
          docker tag ghcr.io/buywhere/buywhere:sha-${{ github.sha }} $AR_IMAGE
          echo "=== Pushing to GAR ==="
          docker push $AR_IMAGE
          echo "AR_IMAGE=$AR_IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          echo "Deploying to Cloud Run staging..."
          echo "Using image: $AR_IMAGE"
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --region ${{ env.GCP_REGION }} \
            --image $AR_IMAGE \
            --platform managed \
            --allow-unauthenticated \
            --add-cloudsql-instances ${{ env.CLOUD_SQL_INSTANCE }} \
            --set-env-vars "ENVIRONMENT=staging" \
            --set-env-vars "PG_POOL_MAX=50" \
            --set-env-vars "DATABASE_URL=${{ secrets.CLOUD_SQL_STAGING_CONNECTION_STRING }}" \
            --set-env-vars "REDIS_URL=${{ secrets.REDIS_STAGING_URL }}" \
            --set-env-vars "API_KEY_SECRET=${{ secrets.API_KEY_SECRET_STAGING }}" \
            --set-env-vars "SENTRY_DSN=${{ secrets.SENTRY_DSN_STAGING }}" \
            --set-secrets "POSTHOG_PROJECT_KEY=buywhere-posthog-api-key:latest" \
            --set-env-vars "PAPERCLIP_API_KEY=${{ secrets.PAPERCLIP_API_KEY }}" \
            --set-env-vars "PAPERCLIP_API_URL=${{ secrets.PAPERCLIP_API_URL }}" \
            --port 3000 \
            --memory 1Gi \
            --cpu 2 \
            --min-instances 1 \
            --max-instances 10 \
            --concurrency 80 \
            --timeout 60s \
            --format json 2>&1 | tee /tmp/deploy_output.json
          echo "=== Deploy result ==="
          cat /tmp/deploy_output.json
          # Extract service URL
          SERVICE_URL=$(jq -s 'last | .status.url // .metadata.annotations."run.googleapis.com/urls" | strings' /tmp/deploy_output.json 2>/dev/null | head -1)
          if [ -z "$SERVICE_URL" ]; then
            SERVICE_URL=$(gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} --region ${{ env.GCP_REGION }} --project ${{ env.GCP_PROJECT_ID }} --format 'value(status.url)' 2>/dev/null)
          fi
          if [ -z "$SERVICE_URL" ] || [ "$SERVICE_URL" = "null" ]; then
            echo "ERROR: Deploy failed, no URL captured"
            echo "Checking service status..."
            gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} --region ${{ env.GCP_REGION }} --project ${{ env.GCP_PROJECT_ID }} || true
            exit 1
          fi
          echo "url=$SERVICE_URL" >> $GITHUB_OUTPUT

      - name: Get revision status
        run: |
          echo "=== Latest Created Revision ==="
          gcloud run revisions list --service ${{ env.CLOUD_RUN_SERVICE }} --region ${{ env.GCP_REGION }} --project ${{ env.GCP_PROJECT_ID }} --limit 1 --format "table(name,status.conditions.status,status.conditions.type,status.conditions.reason)"
          echo "=== Revision Logs ==="
          LATEST_REV=$(gcloud run revisions list --service ${{ env.CLOUD_RUN_SERVICE }} --region ${{ env.GCP_REGION }} --project ${{ env.GCP_PROJECT_ID }} --limit 1 --format "value(name)")
          gcloud logging read "resource.type=cloud_run_revision AND resource.labels.revision_name=$LATEST_REV AND severity>=ERROR" --project ${{ env.GCP_PROJECT_ID }} --limit 20 --format "value(textPayload)" 2>/dev/null || echo "(no error logs found)"

      - name: Wait for service to stabilize
        run: |
          echo "Waiting 20 seconds for Cloud Run service to initialize..."
          sleep 20

      - name: Verify Cloud Run deployment
        run: |
          echo "=== Service Status ==="
          gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --region ${{ env.GCP_REGION }} \
            --format "table(status.conditions.name,status.conditions.status,status.conditions.reason)"
          echo ""
          echo "=== Traffic & Revisions ==="
          gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --region ${{ env.GCP_REGION }} \
            --format "value(status.latestCreatedRevisionName,status.latestReadyRevisionName,status.traffic)" || true
          LATEST_CREATED=$(gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} --project ${{ env.GCP_PROJECT_ID }} --region ${{ env.GCP_REGION }} --format "value(status.latestCreatedRevisionName)")
          LATEST_READY=$(gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} --project ${{ env.GCP_PROJECT_ID }} --region ${{ env.GCP_REGION }} --format "value(status.latestReadyRevisionName)")
          if [ "$LATEST_CREATED" != "$LATEST_READY" ]; then
            echo "WARNING: Latest revision $LATEST_CREATED did NOT become ready!"
            echo "Checking revision conditions..."
            gcloud run revisions describe $LATEST_CREATED --region ${{ env.GCP_REGION }} --project ${{ env.GCP_PROJECT_ID }} --format "table(status.conditions.name,status.conditions.status,status.conditions.reason)" || true
          fi

  api-latency-smoke-test:
    name: API Latency Smoke Test
    needs: deploy-cloud-run
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run API latency smoke test
        env:
          API_BASE_URL: ${{ needs.deploy-cloud-run.outputs.url }}
          K6_API_KEY: ${{ secrets.K6_API_KEY_STAGING }}
        run: |
          chmod +x scripts/cloud-run-latency-smoke-test.sh
          ./scripts/cloud-run-latency-smoke-test.sh "$API_BASE_URL"

  k6-load-test:
    name: k6 Load Test (QA)
    needs: deploy-cloud-run
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver keyserver.ubuntu.com --recv-keys C5AD17C5C7B3759B332F72376E6821B1A45C7495 2>/dev/null || true
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq k6

      - name: Run k6 load test
        env:
          API_BASE_URL: ${{ needs.deploy-cloud-run.outputs.url }}
          K6_API_KEY: ${{ secrets.K6_API_KEY_STAGING }}
          K6_TARGET_VUS: 1000
          K6_DURATION: 5m
          K6_THRESHOLD_P95_MS: 200
          K6_THRESHOLD_P99_MS: 300
        run: |
          k6 run scripts/k6-load-test.js \
            --env K6_API_BASE_URL="$API_BASE_URL" \
            --env K6_API_KEY="$K6_API_KEY" \
            --env K6_TARGET_VUS=1000 \
            --env K6_DURATION=5m \
            --env K6_THRESHOLD_P95_MS=200 \
            --env K6_THRESHOLD_P99_MS=300 \
            --out json=k6-results.json

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results-staging
          path: k6-results.json
          retention-days: 7