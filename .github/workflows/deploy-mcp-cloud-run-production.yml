name: Deploy MCP to Cloud Run (Production)

on:
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip smoke tests'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: buywhere/buywhere-catalog-api
  GCP_PROJECT_ID: gaia-calendar-488606
  GCP_REGION: asia-southeast1
  CLOUD_RUN_SERVICE: buywhere-mcp
  CLOUD_SQL_INSTANCE: gaia-calendar-488606:asia-southeast1:buywhere-db

jobs:
  build:
    name: Build MCP Docker Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ghcr.io/buywhere/buywhere-catalog-api-mcp:${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-mcp
          tags: |
            type=sha,prefix=mcp-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push MCP image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.mcp
          push: true
          tags: |
            ghcr.io/buywhere/buywhere-catalog-api-mcp:${{ github.sha }}
            ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-cloud-run:
    name: Deploy MCP to Cloud Run
    needs: build
    runs-on: ubuntu-latest
    environment: production
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for GHCR
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Deploy MCP to Cloud Run
        id: deploy
        run: |
          set -o pipefail
          echo "Deploying MCP to Cloud Run..."
          SERVICE_URL=$(gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --region ${{ env.GCP_REGION }} \
            --image ${{ needs.build.outputs.image_tag }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "BUYWHERE_API_URL=${{ secrets.BUYWHERE_API_URL_PROD }}" \
            --set-env-vars "BUYWHERE_API_KEY=${{ secrets.BUYWHERE_API_KEY_PROD }}" \
            --set-env-vars "BUYWHERE_MCP_HTTP_PORT=8080" \
            --set-env-vars "BUYWHERE_REDIS_URL=${{ secrets.REDIS_PRODUCTION_URL }}" \
            --set-env-vars "DATABASE_URL=${{ secrets.CLOUD_SQL_PRODUCTION_CONNECTION_STRING }}" \
            --add-cloudsql-instances ${{ env.CLOUD_SQL_INSTANCE }} \
            --set-env-vars "APP_BASE_URL=https://api.buywhere.ai" \
            --set-env-vars "LOG_LEVEL=INFO" \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 1 \
            --max-instances 10 \
            --concurrency 80 \
            --timeout 60s \
            --labels "commit-sha=${{ github.sha }}" \
            --format json | jq -r '.status.url')

          echo "MCP Service URL: $SERVICE_URL"
          echo "url=$SERVICE_URL" >> $GITHUB_OUTPUT

      - name: Wait for service to stabilize
        run: |
          echo "Waiting 20 seconds for Cloud Run service to initialize..."
          sleep 20

      - name: Verify Cloud Run deployment
        run: |
          gcloud run services describe ${{ env.CLOUD_RUN_SERVICE }} \
            --project ${{ env.GCP_PROJECT_ID }} \
            --region ${{ env.GCP_REGION }} \
            --format "table(status.conditions.name,status.conditions.status,status.conditions.reason)" || true

  mcp-integration-tests:
    name: MCP Integration Tests
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: api

      - name: Build TypeScript
        run: npm run build
        working-directory: api

      - name: Run MCP integration tests
        env:
          NODE_ENV: test
        run: npm run test:mcp
        working-directory: api

  mcp-healthcheck:
    name: MCP Health Check
    needs: deploy-cloud-run
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: MCP Health Check
        env:
          MCP_BASE_URL: ${{ needs.deploy-cloud-run.outputs.url || 'https://mcp.buywhere.ai' }}
        run: |
          echo "Checking MCP health at $MCP_BASE_URL..."
          
          for i in 1 2 3 4 5; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "$MCP_BASE_URL/health" --max-time 30 --retry 3 --retry-delay 5)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "MCP health check passed (attempt $i)"
              exit 0
            fi
            echo "MCP health check failed (attempt $i/$MAX_RETRIES). HTTP code: $HTTP_CODE"
            sleep 10
          done
          
          echo "MCP health check failed after 5 attempts."
          curl -v "$MCP_BASE_URL/health" --max-time 30
          exit 1

  mcp-load-test:
    name: MCP Load Test (k6)
    needs: deploy-cloud-run
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg
          curl -s https://dl.k6.io/key.gpg | sudo apt-key add -
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Wait for service readiness
        run: sleep 15

      - name: Run MCP k6 load test
        env:
          MCP_URL: ${{ needs.deploy-cloud-run.outputs.url || 'https://mcp.buywhere.ai' }}
          MCP_API_KEY: ${{ secrets.BUYWHERE_MCP_API_KEY }}
        run: |
          k6 run \
            --out json=k6-output.json \
            scripts/k6-mcp-load-test.js || EXIT_CODE=$?
          if [ "${EXIT_CODE:-0}" -ne 0 ]; then
            echo "k6 load test failed (exit code $EXIT_CODE)"
            cat k6-output.json | tail -50 || true
            exit $EXIT_CODE
          fi

      - name: Upload k6 results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-mcp-results
          path: k6-mcp-summary.json
          retention-days: 7

      - name: Check latency budget
        run: |
          if [ -f k6-mcp-summary.json ]; then
            echo "k6 results saved to k6-mcp-summary.json"
            cat k6-mcp-summary.json | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          budget_violations = []
          critical_metrics = {
              'mcp_search_latency_ms': 500,
              'mcp_get_product_latency_ms': 500,
              'mcp_compare_latency_ms': 500,
              'mcp_deals_latency_ms': 500,
              'mcp_categories_latency_ms': 500,
              'mcp_best_price_latency_ms': 500,
          }
          for key, budget in critical_metrics.items():
              m = d.get('metrics', {}).get(key)
              if m and m.get('values', {}).get('p(95)', 0) > budget:
                  print(f'BUDGET VIOLATION: {key} p(95)={m[\"values\"][\"p(95)\"]:.0f}ms > budget {budget}ms')
                  budget_violations.append(key)
          if budget_violations:
              print(f'FAILED: {len(budget_violations)} latency budget violations')
              sys.exit(1)
          else:
              print('OK: All latency budgets within limits')
          " || echo "Warning: could not parse k6 summary"
          fi

  summary:
    name: Deployment Summary
    needs: [deploy-cloud-run, mcp-integration-tests, mcp-healthcheck, mcp-load-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate deployment summary
        run: |
          echo "## MCP Cloud Run Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Cloud Run Deployment | ${{ needs.deploy-cloud-run.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| MCP Integration Tests | ${{ needs.mcp-integration-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| MCP Health Check | ${{ needs.mcp-healthcheck.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| MCP Load Test (k6) | ${{ needs.mcp-load-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "MCP Service URL: ${{ needs.deploy-cloud-run.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Latency Budget" >> $GITHUB_STEP_SUMMARY
          echo "See [latency budget document](/BUY/docs/mcp-latency-budget.md) for full targets." >> $GITHUB_STEP_SUMMARY
