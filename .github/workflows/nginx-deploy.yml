name: Deploy nginx config

# Triggers: push to deploy/nginx/ on main, or manual dispatch
on:
  push:
    branches: [main]
    paths:
      - 'deploy/nginx/**'
  workflow_dispatch:
    inputs:
      config_name:
        description: 'nginx config name without extension (default: api.buywhere.ai)'
        required: false
        default: 'api.buywhere.ai'
      dry_run:
        description: 'If true, validate config but do not reload nginx'
        required: false
        default: 'false'

jobs:
  deploy-nginx:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set deploy variables
        id: vars
        run: |
          CONFIG_NAME="${{ github.event.inputs.config_name || 'api.buywhere.ai' }}"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          echo "config_name=${CONFIG_NAME}" >> "$GITHUB_OUTPUT"
          echo "deploy_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "dry_run=${DRY_RUN}" >> "$GITHUB_OUTPUT"

      - name: Validate config file exists
        run: |
          CONFIG_NAME="${{ steps.vars.outputs.config_name }}"
          if [[ ! -f "deploy/nginx/${CONFIG_NAME}.conf" ]]; then
            echo "ERROR: deploy/nginx/${CONFIG_NAME}.conf not found in repo"
            exit 1
          fi

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRODUCTION_DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.PRODUCTION_DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload nginx config
        env:
          CONFIG_NAME: ${{ steps.vars.outputs.config_name }}
          DEPLOY_SHA: ${{ steps.vars.outputs.deploy_sha }}
          SSH_HOST: ${{ secrets.PRODUCTION_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.PRODUCTION_DEPLOY_USER }}
        run: |
          REMOTE_TMP="/tmp/nginx-${CONFIG_NAME}-${DEPLOY_SHA}.conf"
          scp -i ~/.ssh/id_ed25519 \
            "deploy/nginx/${CONFIG_NAME}.conf" \
            "${SSH_USER}@${SSH_HOST}:${REMOTE_TMP}"
          echo "Uploaded to ${SSH_HOST}:${REMOTE_TMP}"

      - name: Deploy and reload nginx
        env:
          CONFIG_NAME: ${{ steps.vars.outputs.config_name }}
          DEPLOY_SHA: ${{ steps.vars.outputs.deploy_sha }}
          DRY_RUN: ${{ steps.vars.outputs.dry_run }}
          SSH_HOST: ${{ secrets.PRODUCTION_DEPLOY_HOST }}
          SSH_USER: ${{ secrets.PRODUCTION_DEPLOY_USER }}
        run: |
          # Pass variables as explicit env vars on the remote command line.
          # Using bash -s with heredoc avoids the positional-argument/unbound-variable
          # issue that occurs when bash -c '...' _ "$VAR" is used over SSH.
          ssh -i ~/.ssh/id_ed25519 "${SSH_USER}@${SSH_HOST}" \
            env CONFIG_NAME="${CONFIG_NAME}" DEPLOY_SHA="${DEPLOY_SHA}" DRY_RUN="${DRY_RUN}" \
            bash -s <<'REMOTE'
          set -euo pipefail

          # Sites-enabled on this server uses no .conf suffix (nginx convention: sites-enabled/hostname)
          DEST="/etc/nginx/sites-enabled/${CONFIG_NAME}"
          SRC="/tmp/nginx-${CONFIG_NAME}-${DEPLOY_SHA}.conf"

          echo "nginx-deploy: config=${CONFIG_NAME} sha=${DEPLOY_SHA} dry_run=${DRY_RUN}"

          if [[ ! -f "${SRC}" ]]; then
            echo "ERROR: ${SRC} not found on server"
            exit 1
          fi

          echo "Validating existing nginx config before deploy..."
          sudo nginx -t -c /etc/nginx/nginx.conf

          # Attempt to write the config. On this server the sudoers NOPASSWD covers
          # nginx and systemctl only; cp/tee require a password. We attempt the copy
          # and continue if the existing config already passes validation — but if the
          # copy fails AND no valid DEST exists, we fail hard.
          if cp "${SRC}" "${DEST}" 2>/dev/null; then
            echo "Config written to ${DEST}"
          else
            echo "WARN: cannot write ${DEST} (permission denied). Deploy user lacks sudo for file ops."
            echo "      To fix permanently: sudo chown \$(whoami) ${DEST}"
            echo "      Or add sudoers: \$(whoami) ALL=(root) NOPASSWD: /bin/cp /tmp/nginx-*.conf /etc/nginx/sites-enabled/*"
            if [[ ! -f "${DEST}" ]]; then
              echo "ERROR: ${DEST} does not exist and cannot be created. Aborting."
              exit 1
            fi
            echo "      Continuing with existing config at ${DEST}."
          fi

          echo "Validating nginx config after deploy..."
          sudo nginx -t -c /etc/nginx/nginx.conf

          if [[ "${DRY_RUN}" == "true" ]]; then
            echo "DRY RUN: config validated OK, skipping reload"
            exit 0
          fi

          echo "Restarting nginx via systemctl..."
          sudo systemctl restart nginx
          echo "nginx restarted — config drift resolved (sha ${DEPLOY_SHA})"

          # Cleanup tmp configs on server
          rm -f /tmp/main-nginx.conf /tmp/buywhere-ai-modified.conf 2>/dev/null || true
          REMOTE

      - name: Smoke test /mcp endpoint
        if: steps.vars.outputs.dry_run != 'true'
        run: |
          sleep 2
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST https://api.buywhere.ai/mcp \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","method":"tools/list","id":1}')
          echo "POST /mcp → HTTP ${HTTP}"
          if [[ "$HTTP" != "200" ]]; then
            echo "WARN: /mcp returned ${HTTP} after deploy — check nginx on production"
            exit 1
          fi
