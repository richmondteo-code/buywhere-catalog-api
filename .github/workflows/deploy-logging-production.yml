name: Deploy Logging Infrastructure to Production

on:
  push:
    branches:
      - main
    paths:
      - 'k8s/production/**'
      - 'k8s/base/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy-logging-production:
    name: Deploy Logging Stack to Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_PRODUCTION }}

      - name: Deploy Loki
        run: |
          kubectl apply -f k8s/production/namespace.yaml
          kubectl apply -f k8s/production/loki-configmap.yaml
          kubectl apply -f k8s/production/loki-service.yaml
          kubectl apply -f k8s/production/loki-deployment.yaml

      - name: Deploy Promtail
        run: |
          kubectl apply -f k8s/production/promtail-rbac.yaml
          kubectl apply -f k8s/production/promtail-configmap.yaml
          kubectl apply -f k8s/production/promtail-daemonset.yaml

      - name: Deploy Fluent-bit
        run: |
          kubectl apply -f k8s/production/fluent-bit-rbac.yaml
          kubectl apply -f k8s/production/fluent-bit-configmap.yaml
          kubectl apply -f k8s/production/fluent-bit-daemonset.yaml

      - name: Deploy Loki Alerts
        run: |
          kubectl apply -f k8s/production/loki-alerts-configmap.yaml

      - name: Wait for Loki rollout
        run: |
          kubectl rollout status deployment/loki -n production --timeout=300s

      - name: Verify Loki deployment
        run: |
          kubectl get pods -n production -l app=loki
          kubectl get svc -n production -l app=loki

      - name: Verify Promtail daemonset
        run: |
          kubectl get daemonset -n production -l app=promtail

      - name: Verify Fluent-bit daemonset
        run: |
          kubectl get daemonset -n production -l app=fluent-bit

  health-check:
    name: Logging Health Check
    needs: deploy-logging-production
    runs-on: ubuntu-latest
    steps:
      - name: Check Loki endpoint
        run: |
          kubectl exec -n production deployment/loki -- wget -qO- http://localhost:3100/ready || exit 1

  rollback:
    name: Rollback Logging on Failure
    needs: [deploy-logging-production, health-check]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Configure kubectl
        uses: azure/k8s-set-context@v3
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_PRODUCTION }}

      - name: Rollback Loki
        run: |
          kubectl rollout undo deployment/loki -n production
          kubectl rollout status deployment/loki -n production --timeout=300s

      - name: Rollback Promtail
        run: |
          kubectl rollout undo daemonset/promtail -n production
          kubectl rollout status daemonset/promtail -n production --timeout=300s

      - name: Rollback Fluent-bit
        run: |
          kubectl rollout undo daemonset/fluent-bit -n production
          kubectl rollout status daemonset/fluent-bit -n production --timeout=300s