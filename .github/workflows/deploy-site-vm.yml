name: Deploy Next.js Site to Production VM

# Deploys the Next.js site to the production VM where the live nginx
# for buywhere.ai proxies to a local Next.js process (localhost:3000).
# This is separate from the Cloud Run deploy (deploy-site-production.yml)
# which targets the buywhere-site-production Cloud Run service used once
# the buywhere.ai nginx conf is updated to point at Cloud Run.
#
# Use this workflow to update the locally-running Next.js site until the
# nginx config deployment permission issue is resolved.

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy (default: main)'
        required: false
        default: 'main'
        type: string

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy Next.js site to VM
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_DEPLOY_SSH_KEY }}

      - name: Trust production host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.PRODUCTION_DEPLOY_PORT || 22 }}" -H "${{ secrets.PRODUCTION_DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Diagnose VM state
        env:
          DEPLOY_HOST: ${{ secrets.PRODUCTION_DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.PRODUCTION_DEPLOY_PORT || 22 }}
          DEPLOY_USER: ${{ secrets.PRODUCTION_DEPLOY_USER }}
        run: |
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" bash -s << 'ENDSSH'
            echo "=== Port 3006 (ss with -p shows pid if owned by current user) ==="
            ss -tlnp 2>/dev/null | grep :3006 || echo "nothing on 3006"
            echo ""
            echo "=== fuser 3006/tcp (shows PID owning port) ==="
            fuser 3006/tcp 2>/dev/null || echo "fuser failed or no output"
            echo ""
            echo "=== ALL systemd services ==="
            systemctl list-units --type=service --all 2>/dev/null | head -50
            echo ""
            echo "=== BUY-7302 commit (documents runtime/restart path) ==="
            git -C "$HOME/buywhere-site" show e4d2aaa09 --stat 2>/dev/null || echo "commit not found"
            git -C "$HOME/buywhere-site" show e4d2aaa09 -- "*.md" 2>/dev/null | head -80 || true
            echo ""
            echo "=== sudo -n available commands ==="
            sudo -n -l 2>/dev/null || echo "no passwordless sudo or sudo not available"
            echo ""
            echo "=== .next-deploy permissions deep ==="
            ls -la "$HOME/buywhere-site/.next-deploy/" 2>/dev/null | head -5
            ls -la "$HOME/buywhere-site/.next-deploy/standalone/" 2>/dev/null | head -5
          ENDSSH

      - name: Pull, build, restart
        env:
          DEPLOY_HOST: ${{ secrets.PRODUCTION_DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.PRODUCTION_DEPLOY_PORT || 22 }}
          DEPLOY_USER: ${{ secrets.PRODUCTION_DEPLOY_USER }}
          BRANCH: ${{ inputs.branch || 'main' }}
        run: |
          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "BRANCH=$BRANCH bash -s" << 'ENDSSH'
            set -euo pipefail
            echo "=== BuyWhere Next.js site VM deploy starting ==="

            # Find the site directory.
            # Diagnostic run confirmed: buywhere-site is at $HOME/buywhere-site
            # (proxy_pass http://127.0.0.1:3006 in the live nginx config)
            SITE_DIR=""
            DEPLOY_HOME="$HOME"
            for candidate in "$DEPLOY_HOME/buywhere-site" "$DEPLOY_HOME/buywhere-api" /tmp/main-site /srv/buywhere /srv/buywhere-site /opt/buywhere; do
              if [ -f "$candidate/next.config.mjs" ] || [ -f "$candidate/next.config.js" ]; then
                SITE_DIR="$candidate"
                break
              fi
            done

            if [ -z "$SITE_DIR" ]; then
              echo "ERROR: Could not find next.config.mjs in any candidate directory"
              exit 1
            fi
            echo "Site directory: $SITE_DIR"

            cd "$SITE_DIR"

            # Update to latest origin — force-sync to handle diverged local changes.
            # The VM's local main has modifications to src/app/openapi.json/route.ts
            # (and others) that diverge from origin. We hard-reset to get the
            # BUY-7473 fix (308 redirect) deployed. Local changes are discarded.
            echo "=== git fetch + reset --hard origin/$BRANCH ==="
            git fetch origin
            git checkout "$BRANCH" 2>/dev/null || git checkout -b "$BRANCH" "origin/$BRANCH"
            git reset --hard "origin/$BRANCH"
            echo "HEAD: $(git log --oneline -1)"
            echo "route.ts content: $(head -5 src/app/openapi.json/route.ts)"

            # Build into .next-fresh to avoid the root-owned files in .next-deploy/standalone/
            # The .next-deploy directory has root-owned files from a previous root build
            # that the deploy user cannot remove, causing Next.js's cleanup to fail.
            # Workaround: override distDir to .next-fresh (a new directory) for this build,
            # then restart the server from .next-fresh/standalone/server.js.
            echo "=== temporarily overriding distDir to .next-fresh ==="
            cp next.config.mjs next.config.mjs.bak
            python3 - << 'PYEOF'
import re, sys
with open('next.config.mjs', 'r') as f:
    content = f.read()
# Replace distDir value
updated = re.sub(r"distDir:\s*['\"][^'\"]*['\"]", "distDir: '.next-fresh'", content)
if 'distDir' not in updated:
    updated = content.replace('output:', "distDir: '.next-fresh',\n  output:")
with open('next.config.mjs', 'w') as f:
    f.write(updated)
print("next.config.mjs patched")
PYEOF
            grep "distDir" next.config.mjs

            # Build Next.js — required to compile the updated route handler
            echo "=== npm run build (into .next-fresh) ==="
            if command -v npm &>/dev/null; then
              npm ci --prefer-offline 2>/dev/null || npm install
              npm run build
            elif command -v pnpm &>/dev/null; then
              pnpm install --frozen-lockfile
              pnpm run build
            else
              echo "ERROR: neither npm nor pnpm found"
              cp next.config.mjs.bak next.config.mjs  # restore on error
              exit 1
            fi

            # Restore original next.config.mjs (keep .next-fresh for runtime, restore config for future builds)
            cp next.config.mjs.bak next.config.mjs
            echo "Build complete into .next-fresh: HEAD=$(git log --oneline -1)"

            # Restart the site process.
            # Diagnostic confirmed: runs as nohup, NOT systemd (service not installed yet).
            # PID is stored in .runtime/buywhere-site.pid.
            echo "=== restarting nohup site process ==="
            PID_FILE="$SITE_DIR/.runtime/buywhere-site.pid"
            if [ -f "$PID_FILE" ]; then
              OLD_PID=$(cat "$PID_FILE" 2>/dev/null || echo "")
              if [ -n "$OLD_PID" ]; then
                echo "Killing old process PID=$OLD_PID"
                kill "$OLD_PID" 2>/dev/null && echo "Killed PID $OLD_PID" || echo "Process $OLD_PID already gone"
                sleep 2
              fi
            fi

            # Read start env from service file if it exists (for PORT, HOSTNAME, etc.)
            SERVICE_FILE="$SITE_DIR/deploy/buywhere-site.service"
            START_ENV="PORT=3006 HOSTNAME=127.0.0.1"
            if [ -f "$SERVICE_FILE" ]; then
              # Extract Environment= lines from systemd unit
              EXTRA=$(grep "^Environment=" "$SERVICE_FILE" 2>/dev/null | sed 's/^Environment=//' | tr '\n' ' ')
              if [ -n "$EXTRA" ]; then
                START_ENV="$EXTRA"
              fi
              echo "Using env from service file: $START_ENV"
            fi

            mkdir -p "$SITE_DIR/.runtime"
            LOG_FILE="$SITE_DIR/.runtime/buywhere-site.log"
            ENTRY="$SITE_DIR/.next-fresh/standalone/server.js"
            if [ ! -f "$ENTRY" ]; then
              echo "ERROR: standalone server.js not found at $ENTRY after build"
              exit 1
            fi

            # Start new nohup process
            env $START_ENV nohup node "$ENTRY" > "$LOG_FILE" 2>&1 &
            NEW_PID=$!
            echo $NEW_PID > "$PID_FILE"
            echo "Started new process PID=$NEW_PID"
            sleep 5

            # Verify new process is running
            if kill -0 "$NEW_PID" 2>/dev/null; then
              echo "Process $NEW_PID is running"
              curl -sf http://127.0.0.1:3006/ -o /dev/null && echo "Port 3006 responded OK" || echo "WARN: port 3006 not yet responding"
            else
              echo "ERROR: Process $NEW_PID died. Last log lines:"
              tail -20 "$LOG_FILE" || true
              exit 1
            fi

            echo "=== VM site deploy complete ==="
          ENDSSH

      - name: Smoke test buywhere.ai/openapi.json
        run: |
          echo "Waiting 15s for site to come up..."
          sleep 15
          # Follow redirect to verify the chain works end-to-end
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -L \
            https://buywhere.ai/openapi.json --max-time 15 || echo "000")
          REDIRECT=$(curl -s -o /dev/null -w "%{redirect_url}" \
            https://buywhere.ai/openapi.json --max-time 15 || echo "")
          echo "GET https://buywhere.ai/openapi.json → HTTP $HTTP (redirect: $REDIRECT)"
          # Primary check: redirect to canonical
          DIRECT=$(curl -s -o /dev/null -w "%{http_code}" \
            https://buywhere.ai/openapi.json --max-time 15 --max-redirs 0 || echo "000")
          echo "No-follow: HTTP $DIRECT"
          if [[ "$DIRECT" == "308" ]] || [[ "$DIRECT" == "301" ]] || [[ "$DIRECT" == "302" ]]; then
            echo "PASS: buywhere.ai/openapi.json correctly redirects (HTTP $DIRECT)"
          elif [[ "$HTTP" == "200" ]]; then
            # Verify it's the canonical spec, not the stale .io spec
            CONTENT=$(curl -s https://buywhere.ai/openapi.json -L --max-time 15 | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('servers',[{}])[0].get('url','UNKNOWN'))" 2>/dev/null || echo "PARSE_ERROR")
            echo "Final spec server URL: $CONTENT"
            if echo "$CONTENT" | grep -q "buywhere.ai"; then
              echo "PASS: resolves to canonical .ai spec"
            else
              echo "FAIL: spec still points to $CONTENT"
              exit 1
            fi
          else
            echo "FAIL: unexpected HTTP $DIRECT / $HTTP"
            exit 1
          fi
