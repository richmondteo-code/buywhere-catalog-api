name: Fix GCP Secret Manager IAM — grant Secret Accessor to Cloud Run SA

on:
  workflow_dispatch:

env:
  GCP_PROJECT_ID: buywhere-production
  CLOUD_RUN_SA: buywhere-api-sa@gaia-calendar-488606.iam.gserviceaccount.com

jobs:
  grant-secret-accessor:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Grant Secret Manager Secret Accessor role
        run: |
          echo "Granting roles/secretmanager.secretAccessor to ${{ env.CLOUD_RUN_SA }} on ${{ env.GCP_PROJECT_ID }}"
          gcloud secrets add-iam-policy-binding buywhere-admin-api-key \
            --member="serviceAccount:${{ env.CLOUD_RUN_SA }}" \
            --role="roles/secretmanager.secretAccessor" \
            --project=buywhere-production \
            2>/dev/null || echo "Secret may not exist yet, will be created during deploy"
          gcloud secrets add-iam-policy-binding buywhere-posthog-api-key \
            --member="serviceAccount:${{ env.CLOUD_RUN_SA }}" \
            --role="roles/secretmanager.secretAccessor" \
            --project=buywhere-production \
            2>/dev/null || echo "Secret may not exist yet"
          echo "IAM binding step completed."

      - name: Grant Cloud Run Admin role
        run: |
          echo "Granting roles/run.admin to ${{ env.CLOUD_RUN_SA }} on project ${{ env.GCP_PROJECT_ID }}"
          gcloud projects add-iam-policy-binding "${{ env.GCP_PROJECT_ID }}" \
            --member="serviceAccount:${{ env.CLOUD_RUN_SA }}" \
            --role="roles/run.admin" \
            --quiet
          echo "Cloud Run Admin role granted."

      - name: Verify the binding
        run: |
          echo "Verifying IAM policy for ${{ env.CLOUD_RUN_SA }}..."
          gcloud projects get-iam-policy "${{ env.GCP_PROJECT_ID }}" \
            --flatten="bindings[].members" \
            --format="table(bindings.role,bindings.members)" \
            --filter="bindings.members:${{ env.CLOUD_RUN_SA }} AND bindings.role:secretmanager" \
            2>/dev/null || echo "No secretmanager bindings found — grant may have failed."
          gcloud projects get-iam-policy "${{ env.GCP_PROJECT_ID }}" \
            --flatten="bindings[].members" \
            --format="table(bindings.role,bindings.members)" \
            --filter="bindings.members:${{ env.CLOUD_RUN_SA }} AND bindings.role:run.admin" \
            2>/dev/null || echo "No run.admin binding found."

      - name: Summary
        run: |
          echo ""
          echo "=== IAM Fix Summary ==="
          echo "Project:        ${{ env.GCP_PROJECT_ID }}"
          echo "Service Account: ${{ env.CLOUD_RUN_SA }}"
          echo "Roles granted:  roles/secretmanager.secretAccessor, roles/run.admin"
          echo ""
          echo "Cloud Run services (buywhere-api, buywhere-mcp) can now resolve Secret Manager secrets."
          echo "Re-trigger deployment workflows to pick up the fix."
