version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: buywhere-api:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_REPLICA_URL: ${DATABASE_REPLICA_URL}
      PGBOUNCER_URL: ${PGBOUNCER_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-1000}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      ENVIRONMENT: production
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
      db_replica:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
           cpus: "0.5"
           memory: 512M
 
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: buywhere-api:latest
    command: alembic upgrade head
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: catalog
      POSTGRES_USER: ${POSTGRES_USER:-buywhere}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-buywhere}
      POSTGRES_HOSTNAME: primary
      REPLICA_USER: ${POSTGRES_USER:-buywhere}
      REPLICA_PASSWORD: ${POSTGRES_PASSWORD:-buywhere}
      REPLICA_SLOT_NAME: ${REPLICA_SLOT_NAME:-replica_slot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgresql_primary.conf:/etc/postgresql/postgresql.conf:ro
      - ./scripts/setup_replication.sh:/docker-entrypoint-initdb.d/10_setup_replication.sh:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-buywhere} -d catalog"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  db_replica:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: catalog
      POSTGRES_USER: ${POSTGRES_USER:-buywhere}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-buywhere}
      POSTGRES_HOSTNAME: replica
      REPLICA_USER: ${POSTGRES_USER:-buywhere}
      REPLICA_PASSWORD: ${POSTGRES_PASSWORD:-buywhere}
      REPLICA_SLOT_NAME: ${REPLICA_SLOT_NAME:-replica_slot}
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
      - ./scripts/postgresql_replica.conf:/etc/postgresql/postgresql.conf:ro
      - ./scripts/setup_replica.sh:/usr/local/bin/setup_replica.sh:ro
    entrypoint: ["/bin/bash", "/usr/local/bin/setup_replica.sh"]
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-buywhere} -d catalog"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  pgbouncer:
    image: pgbouncer/pgbouncer:latest
    restart: unless-stopped
    ports:
      - "5435:5432"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-buywhere}:${POSTGRES_PASSWORD:-buywhere}@db:5432/catalog
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "1000"
      DEFAULT_POOL_SIZE: "50"
      MIN_POOL_SIZE: "10"
      RESERVE_POOL_SIZE: "10"
      RESERVE_POOL_TIMEOUT: "3"
      SERVER_RESET_ON_RETURN: "kludge"
      SERVER_LIFETIME: "3600"
      SERVER_IDLE_TIMEOUT: "600"
    depends_on:
      db:
        condition: service_healthy
      db_replica:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "echo show version | nc localhost 5432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  scraper-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: buywhere-api:latest
    restart: unless-stopped
    command: ["python", "-m", "scrapers.scheduler"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SCRAPER_INTERVAL_MINUTES: ${SCRAPER_INTERVAL_MINUTES:-60}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  backup-cron:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: buywhere-api:latest
    restart: unless-stopped
    command: ["sh", "-c", "while true; do sleep 3600; /app/scripts/backup.sh backup hourly; done"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BACKUP_DIR: ${BACKUP_DIR:-/var/backups/buywhere}
      POSTGRES_USER: ${POSTGRES_USER:-buywhere}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-buywhere}
    volumes:
      - backup_data:/var/backups/buywhere
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    image: buywhere-mcp:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      BUYWHERE_API_URL: ${BUYWHERE_API_URL:-http://api:8000}
      BUYWHERE_API_KEY: ${BUYWHERE_API_KEY}
      BUYWHERE_MCP_HTTP_PORT: 8080
      BUYWHERE_LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    restart: unless-stopped
    ports:
      - "9115:9115"
    command:
      - '--config.file=/config/blackbox.yml'
    volumes:
      - ./blackbox.yml:/config/blackbox.yml:ro
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  metrics-collector:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus_alerts.yml:/etc/prometheus/prometheus_alerts.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - api
      - blackbox-exporter
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

volumes:
  postgres_data:
  postgres_replica_data:
  redis_data:
  backup_data:
  prometheus_data:
