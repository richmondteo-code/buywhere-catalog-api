version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: buywhere-api:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8002:8002"
      - "8003:8003"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_REPLICA_URL: ${DATABASE_REPLICA_URL}
      PGBOUNCER_URL: ${PGBOUNCER_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-1000}
      APP_VERSION: ${APP_VERSION:-1.0.0}
      ENVIRONMENT: production
      DEBUG: "false"
      BUYWHERE_API_URL: ${BUYWHERE_API_URL:-http://api:8000}
      USD_DEFAULT: ${USD_DEFAULT:-true}
      US_REGION: ${US_REGION:-us}
      AFFILIATE_TAG: ${AFFILIATE_TAG:-buywhere-20}
    volumes:
      - api_pm2_data:/app/data
      - api_pm2_logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      db_replica:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service,environment"
    labels:
      - "service=api"
      - "environment=production"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
           cpus: "1"
           memory: 1G
 
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: buywhere-api:latest
    command: alembic upgrade head
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service,environment"
    labels:
      - "service=migrate"
      - "environment=production"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: catalog
      POSTGRES_USER: ${POSTGRES_USER:-buywhere}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-buywhere}
      POSTGRES_HOSTNAME: primary
      REPLICA_USER: ${POSTGRES_USER:-buywhere}
      REPLICA_PASSWORD: ${POSTGRES_PASSWORD:-buywhere}
      REPLICA_SLOT_NAME: ${REPLICA_SLOT_NAME:-replica_slot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgresql_primary.conf:/etc/postgresql/postgresql.conf:ro
      - ./scripts/setup_replication.sh:/docker-entrypoint-initdb.d/10_setup_replication.sh:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-buywhere} -d catalog"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service,environment"
    labels:
      - "service=db"
      - "environment=production"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  db_replica:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: catalog
      POSTGRES_USER: ${POSTGRES_USER:-buywhere}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-buywhere}
      POSTGRES_HOSTNAME: replica
      REPLICA_USER: ${POSTGRES_USER:-buywhere}
      REPLICA_PASSWORD: ${POSTGRES_PASSWORD:-buywhere}
      REPLICA_SLOT_NAME: ${REPLICA_SLOT_NAME:-replica_slot}
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
      - ./scripts/postgresql_replica.conf:/etc/postgresql/postgresql.conf:ro
      - ./scripts/setup_replica.sh:/usr/local/bin/setup_replica.sh:ro
    entrypoint: ["/bin/bash", "/usr/local/bin/setup_replica.sh"]
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-buywhere} -d catalog"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service,environment"
    labels:
      - "service=db_replica"
      - "environment=production"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    ports:
      - "5435:5432"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-buywhere}:${POSTGRES_PASSWORD:-buywhere}@db:5432/catalog
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "1000"
      DEFAULT_POOL_SIZE: "100"
      MIN_POOL_SIZE: "20"
      RESERVE_POOL_SIZE: "30"
      RESERVE_POOL_TIMEOUT: "10"
      SERVER_RESET_ON_RETURN: "kludge"
      SERVER_LIFETIME: "3600"
      SERVER_IDLE_TIMEOUT: "600"
    depends_on:
      db:
        condition: service_healthy
      db_replica:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U buywhere || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service,environment"
    labels:
      - "service=pgbouncer"
      - "environment=production"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service,environment"
    labels:
      - "service=redis"
      - "environment=production"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  scraper-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: buywhere-api:latest
    restart: unless-stopped
    command: ["python", "-m", "scrapers.scheduler"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SCRAPER_INTERVAL_MINUTES: ${SCRAPER_INTERVAL_MINUTES:-60}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service,environment"
    labels:
      - "service=scraper-scheduler"
      - "environment=production"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  backup-cron:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: buywhere-api:latest
    restart: unless-stopped
    command: ["sh", "-c", "while true; do /app/scripts/backup.sh backup daily; sleep 86400; done"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BACKUP_DIR: ${BACKUP_DIR:-/var/backups/buywhere}
      POSTGRES_USER: ${POSTGRES_USER:-buywhere}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-buywhere}
    volumes:
      - backup_data:/var/backups/buywhere
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service,environment"
    labels:
      - "service=backup-cron"
      - "environment=production"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  backup-verify-cron:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: buywhere-api:latest
    restart: unless-stopped
    command: ["sh", "-c", "while true; do sleep 604800; /app/scripts/verify_backup.sh verify all && /app/scripts/verify_backup.sh verify-new; done"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BACKUP_DIR: ${BACKUP_DIR:-/var/backups/buywhere}
      POSTGRES_USER: ${POSTGRES_USER:-buywhere}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-buywhere}
      LOG_FILE: /var/log/backup_verify.log
      MAX_BACKUP_AGE_HOURS: 168
    volumes:
      - backup_data:/var/backups/buywhere
      - backup_verify_logs:/var/log
      - buywhere_new_backup_data:/tmp/backups/buywhere_new
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service,environment"
    labels:
      - "service=backup-verify-cron"
      - "environment=production"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  logrotate-cron:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: buywhere-api:latest
    restart: unless-stopped
    command: ["sh", "-c", "while true; do sleep 86400; /app/scripts/logrotate.sh; done"]
    volumes:
      - ./config/logrotate.conf:/app/config/logrotate.conf:ro
      - ./logs:/app/logs
      - ./data:/app/data
      - app_state:/var/lib/logrotate
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service,environment"
    labels:
      - "service=logrotate-cron"
      - "environment=production"
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M

  price-alert-cron:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: buywhere-api:latest
    restart: unless-stopped
    command: ["sh", "-c", "while true; do sleep 86400; python scripts/price_alert_email_cron.py --once; done"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SMTP_HOST: ${SMTP_HOST:-localhost}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-alerts@buywhere.ai}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-BuyWhere}
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service,environment"
    labels:
      - "service=price-alert-cron"
      - "environment=production"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  sitemap-cron:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: buywhere-api:latest
    restart: unless-stopped
    command: ["sh", "-c", "while true; do sleep 86400; /app/scripts/sitemap_cron.sh; done"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SITE_BASE_URL: ${SITE_BASE_URL:-https://buywhere.com}
      S3_BUCKET: ${SITEMAP_S3_BUCKET:-}
      SCRAPER_INTERVAL_MINUTES: ${SCRAPER_INTERVAL_MINUTES:-60}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - ./static:/app/static
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        labels: "service,environment"
    labels:
      - "service=sitemap-cron"
      - "environment=production"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    image: buywhere-mcp:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      BUYWHERE_API_URL: ${BUYWHERE_API_URL:-http://api:8000}
      BUYWHERE_API_KEY: ${BUYWHERE_API_KEY}
      BUYWHERE_MCP_HTTP_PORT: 8080
      BUYWHERE_LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service,environment"
    labels:
      - "com.docker.compose.service=mcp"
      - "com.docker.compose.project=buywhere"
      - "environment=production"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    restart: unless-stopped
    ports:
      - "9115:9115"
    command:
      - '--config.file=/config/blackbox.yml'
    volumes:
      - ./blackbox.yml:/config/blackbox.yml:ro
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service,environment"
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  alertmanager:
    image: prom/alertmanager:latest
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  loki:
    image: grafana/loki:2.9.4
    restart: unless-stopped
    ports:
      - "3110:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yaml:ro
      - ./loki_rules:/loki/rules:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  fluent-bit:
    image: fluent/fluent-bit:3.0.0
    restart: unless-stopped
    ports:
      - "2020:2020"
    volumes:
      - ./fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - ./scripts/timestamp.lua:/fluent-bit/scripts/timestamp.lua:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - api_pm2_logs:/app/logs:ro
      - fluent_bit_data:/var/log
    depends_on:
      - loki
    environment:
      - FLUENT_BIT_ENVIRONMENT=production
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  promtail:
    image: grafana/promtail:2.9.4
    restart: unless-stopped
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yaml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    profiles:
      - legacy

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - loki
      - metrics-collector
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  metrics-collector:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus_alerts.yml:/etc/prometheus/prometheus_alerts.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - api
      - blackbox-exporter
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        labels: "service,environment"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

volumes:
  postgres_data:
  postgres_replica_data:
  redis_data:
  backup_data:
  backup_verify_logs:
  prometheus_data:
  loki_data:
  grafana_data:
  app_state:
  buywhere_new_backup_data:
  api_pm2_data:
  api_pm2_logs:
  alertmanager_data:
  fluent_bit_data:
