# Global nginx configuration for BuyWhere
# api.buywhere.ai - API server
# buywhere.ai / www.buywhere.ai - Site (proxied to Cloud Run)

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss;

    upstream api_backend {
        server 127.0.0.1:8000;
        keepalive 32;
    }

    upstream buywhere_site {
        server buywhere-site-production-3cjo6zft4q-as.a.run.app:443;
        keepalive 8;
    }

    server {
        listen 443 ssl http2;
        server_name api.buywhere.ai;

        ssl_certificate /etc/letsencrypt/live/api.buywhere.ai/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.buywhere.ai/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location /.well-known/glama.json {
            alias /home/paperclip/buywhere-api/glama.json;
            add_header Content-Type application/json;
            add_header Cache-Control "public, max-age=86400";
        }

        location / {
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            proxy_buffering off;
        }
    }

    server {
        listen 443 ssl http2;
        server_name buywhere.ai www.buywhere.ai;

        ssl_certificate /etc/letsencrypt/live/api.buywhere.ai/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.buywhere.ai/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        client_max_body_size 10M;
        client_body_timeout 60s;

        location / {
            proxy_pass https://buywhere_site;
            proxy_ssl_server_name on;
            proxy_ssl_name buywhere-site-production-3cjo6zft4q-as.a.run.app;
            proxy_set_header Host buywhere-site-production-3cjo6zft4q-as.a.run.app;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }
}