upstream buywhere_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

# docs.buywhere.ai — redirect to MkDocs hosted on GitHub Pages
server {
    listen 80;
    server_name docs.buywhere.ai;

    return 301 https://docs.buywhere.ai$request_uri;
}

server {
    listen 443 ssl http2;
    server_name docs.buywhere.ai;

    ssl_certificate /etc/letsencrypt/live/api.buywhere.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.buywhere.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    location / {
        return 301 https://richmondteo-code.github.io/buywhere-catalog-api/$request_uri;
    }
}

server {
    listen 80;
    server_name api.buywhere.ai;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.buywhere.ai;

    ssl_certificate /etc/letsencrypt/live/api.buywhere.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.buywhere.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 10M;
    client_body_timeout 60s;
    proxy_read_timeout 300s;
    proxy_connect_timeout 75s;

    location / {
        proxy_pass http://buywhere_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    location /health {
        proxy_pass http://buywhere_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    location /docs {
        proxy_pass http://buywhere_api/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /openapi.json {
        proxy_pass http://buywhere_api/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs/playground {
        alias /home/paperclip/buywhere-api/docs-portal/playground.html;
        add_header Content-Type text/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /docs-portal/ {
        alias /home/paperclip/buywhere-api/docs-portal/;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /docs-portal/swagger {
        alias /home/paperclip/buywhere-api/docs-portal/swagger.html;
        add_header Content-Type text/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /api/docs {
        proxy_pass http://buywhere_api/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}