apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-alerts
  namespace: production
  labels:
    app: loki
    environment: production
data:
  api_alerts.yaml: |
    groups:
      - name: buywhere_api_production_alerts
        rules:
          - alert: HighErrorRate
            expr: |
              sum(rate({job="fluent-bit", service=~"api.*"} |= "error" [5m])) by (service)
              / sum(rate({job="fluent-bit", service=~"api.*"}[5m])) by (service) > 0.05
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "High error rate detected in {{ $labels.service }}"
              description: "Error rate is {{ $value | printf \"%.2f\" }}% in the last 5 minutes"

          - alert: APIServiceDown
            expr: |
              sum(rate({job="fluent-bit", service=~"api.*"}[5m])) by (service) == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "API service {{ $labels.service }} is down"
              description: "No logs received from {{ $labels.service }} in the last 5 minutes"

          - alert: HighLatency
            expr: |
              histogram_quantile(0.99, sum(rate({job="fluent-bit", service=~"api.*"} |= "latency" [5m])) by (le, service)) > 1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High latency detected in {{ $labels.service }}"
              description: "p99 latency is {{ $value }}s"

  scraper_alerts.yaml: |
    groups:
      - name: scraper_fleet_production_alerts
        rules:
          - alert: ScraperHighErrorRate
            expr: |
              sum(rate({job="fluent-bit", service=~"scraper.*"} |= "error" [5m])) by (service)
              / sum(rate({job="fluent-bit", service=~"scraper.*"}[5m])) by (service) > 0.1
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High error rate in scraper {{ $labels.service }}"
              description: "Scraper error rate is {{ $value | printf \"%.2f\" }}%"

          - alert: ScraperNoLogs
            expr: |
              sum(rate({job="fluent-bit", service=~"scraper.*"}[5m])) by (service) == 0
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "No logs from scraper {{ $labels.service }}"
              description: "Scraper {{ $labels.service }} has not emitted logs in 15 minutes"

  mcp_alerts.yaml: |
    groups:
      - name: mcp_service_production_alerts
        rules:
          - alert: MCPServiceErrors
            expr: |
              sum(rate({job="fluent-bit", service=~"mcp.*"} |= "error" [5m])) by (service)
              / sum(rate({job="fluent-bit", service=~"mcp.*"}[5m])) by (service) > 0.01
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "MCP service error rate is high"
              description: "Error rate is {{ $value | printf \"%.2f\" }}%"

  loki_health_alerts.yaml: |
    groups:
      - name: loki_production_alerts
        rules:
          - alert: LokiHighMemoryUsage
            expr: |
              sum(go_memstats_heap_inuse_bytes{job="loki"}) by (job)
              / sum(go_memstats_heap_limit_bytes{job="loki"}) by (job) > 0.9
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Loki high memory usage"
              description: "Loki memory usage is above 90%"

          - alert: LokiHighCPUUsage
            expr: |
              sum(rate(process_cpu_seconds_total{job="loki"}[5m])) by (job) * 100 > 80
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Loki high CPU usage"
              description: "Loki CPU usage is above 80%"

          - alert: LokiHigh ingestion errors
            expr: |
              sum(rate(loki_ingester_errors_total{job="loki"}[5m])) by (job, error_type) > 10
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Loki ingestion errors"
              description: "Loki is experiencing high ingestion error rate: {{ $value }} errors/s"