apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: production
  labels:
    app: loki
    environment: production
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "3100"
spec:
  type: ClusterIP
  ports:
    - port: 3100
      targetPort: 3100
      protocol: TCP
      name: http
  selector:
    app: loki
    environment: production