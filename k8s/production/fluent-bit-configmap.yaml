apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: production
  labels:
    app: fluent-bit
    environment: production
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Daemon        off
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020
        Health_Check  On

    [INPUT]
        Name              tail
        Path              /var/lib/docker/containers/*/*.log
        Parser            docker
        Tag               docker.*
        Refresh_Interval  5
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On
        DB                /var/log/flb_db/docker.db

    [INPUT]
        Name              tail
        Path              /var/log/containers/*.log
        Parser            json
        Tag               k8s.*
        Refresh_Interval  5
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On
        DB                /var/log/flb_db/k8s.db

    [FILTER]
        Name                parser
        Match               docker.*
        Key_Name            log
        Parser              docker-container
        Reserve_Data        On

    [FILTER]
        Name                kubernetes
        Match               docker.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log           On
        Merge_Log_Key        log_processed
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On
        Labels              On
        Annotations         Off

    [FILTER]
        Name                parser
        Match               k8s.*
        Key_Name            log
        Parser              json
        Reserve_Data        On

    [FILTER]
        Name                modify
        Match               *
        Add                 environment production
        Add                 cluster buywhere-production

    [FILTER]
        Name                lua
        Match               *
        Script              /fluent-bit/scripts/timestamp.lua
        Call                inject_timestamp

    [OUTPUT]
        Name                loki
        Match               *
        Host                loki.production.svc.cluster.local
        Port                3100
        TenantID            production
        Labels              job=fluent-bit,environment=production,cluster=buywhere-production
        Label_Keys          environment,cluster,namespace,container_name,app,service
        Remove_Keys         kubernetes,kube_tag,log_processed
        Line_Frequency      10
        BatchWait           10
        BatchSize           102400
        Retries             10
        Auto_Kubernetes_Labels On

    [OUTPUT]
        Name                stdout
        Match               *
        Format              json_lines

  parsers.conf: |
    [PARSER]
        Name              docker
        Format            json
        Time_Key          time
        Time_Format       %Y-%m-%dT%H:%M:%S.%L
        Time_Keep         On

    [PARSER]
        Name              docker-container
        Format            json
        Time_Key          time
        Time_Format       %Y-%m-%dT%H:%M:%S.%L
        Time_Keep         On

    [PARSER]
        Name              json
        Format            json
        Time_Key          timestamp
        Time_Format       %Y-%m-%dT%H:%M:%SZ
        Time_Keep         On

    [PARSER]
        Name              logfmt
        Format            logfmt

    [PARSER]
        Name              syslog
        Format            regex
        Regex             ^<(?<pri>[0-9]+)>^(?<time>[^ ]+) (?<host>[^ ]+) (?<ident>[^ ]+?)(\[(?<pid>[0-9]+)\])?(?<message>.*)$
        Time_Key          time
        Time_Format       %b %d %H:%M:%S
        Types              pid:integer

  timestamp.lua: |
    function inject_timestamp(tag, timestamp, record)
        record["@timestamp"] = os.date("!%Y-%m-%dT%H:%M:%S.000Z", timestamp)
        return 1, timestamp, record
    end