        - duplicate_rate
        - duplicate_groups
        - sample_duplicates
      properties:
        total_products:
          type: integer
          example: 452300
        products_with_canonical:
          type: integer
          example: 450000
        duplicate_rate:
          type: number
          format: float
          example: 0.005
        duplicate_groups:
          type: integer
          example: 150
        sample_duplicates:
          type: array
          items:
            $ref: '#/components/schemas/DuplicateGroup'
    StaleProductInfo:
      type: object
      required:
        - product_id
        - title
        - source
        - last_updated
        - days_stale
      properties:
        product_id:
          type: integer
          example: 12345
        title:
          type: string
          example: Apple iPhone 15 Pro 256GB Black
        source:
          type: string
          example: shopee_sg
        last_updated:
          type: string
          format: date-time
          example: '2026-04-01T10:30:00Z'
        days_stale:
          type: integer
          example: 3
    FreshnessReport:
      type: object
      required:
        - total_products
        - stale_products
        - stale_rate
        - re_scrape_count
        - by_platform
        - sample_stale
      properties:
        total_products:
          type: integer
          example: 452300
        stale_products:
          type: integer
          example: 15000
        stale_rate:
          type: number
          format: float
          example: 0.033
        re_scrape_count:
          type: integer
          example: 5000
        by_platform:
          type: object
          additionalProperties:
            type: integer
          example:
            shopee_sg: 5000
            lazada_sg: 4000
        sample_stale:
          type: array
          items:
            $ref: '#/components/schemas/StaleProductInfo'
    CatalogHealthReport:
      type: object
      required:
        - generated_at
        - total_indexed
        - by_platform
        - compliance
        - deduplication
        - freshness
      properties:
        generated_at:
          type: string
          format: date-time
          example: '2026-04-03T10:30:00Z'
        total_indexed:
          type: integer
          example: 452300
        by_platform:
          type: object
          additionalProperties:
            type: integer
          example:
            shopee_sg: 150000
            lazada_sg: 120000
        compliance:
          $ref: '#/components/schemas/SchemaComplianceReport'
        deduplication:
          $ref: '#/components/schemas/DeduplicationReport'
        freshness:
          $ref: '#/components/schemas/FreshnessReport'
    ScraperHealth:
      type: object
      required:
        - source
        - product_count
        - is_healthy
      properties:
        source:
          type: string
          example: shopee_sg
        last_run_at:
          type: string
          format: date-time
          nullable: true
          example: '2026-04-03T10:00:00Z'
        last_run_status:
          type: string
          nullable: true
          example: completed
        last_rows_inserted:
          type: integer
          nullable: true
          example: 950
        last_rows_updated:
          type: integer
          nullable: true
          example: 48
        last_rows_failed:
          type: integer
          nullable: true
          example: 2
        product_count:
          type: integer
          example: 150000
        is_healthy:
          type: boolean
          example: true
        hours_since_last_run:
          type: number
          format: float
          nullable: true
          example: 0.5
        error_message:
          type: string
          nullable: true
          example: null
    ScraperHealthReport:
      type: object
      required:
        - generated_at
        - scrapers
        - total_scrapers
        - healthy_count
        - unhealthy_count
      properties:
        generated_at:
          type: string
          format: date-time
          example: '2026-04-03T10:30:00Z'
        scrapers:
          type: array
          items:
            $ref: '#/components/schemas/ScraperHealth'
        total_scrapers:
          type: integer
          example: 6
        healthy_count:
          type: integer
          example: 5
        unhealthy_count:
          type: integer
          example: 1
    CatalogStatsReport:
      type: object
      required:
        - generated_at
        - total_products
        - by_platform
        - by_category
      properties:
        generated_at:
          type: string
          format: date-time
          example: '2026-04-03T10:30:00Z'
        total_products:
          type: integer
          example: 452300
        by_platform:
          type: object
          additionalProperties:
            type: integer
          example:
            shopee_sg: 150000
            lazada_sg: 120000
            carousell: 80000
            qoo10: 50000
        by_category:
          type: object
          additionalProperties:
            type: integer
          example:
            Electronics: 180000
            Fashion: 90000
            Home & Living: 60000
    RatingDistributionBucket:
      type: object
      required:
        - stars
        - count
      properties:
        stars:
          type: integer
          description: Star rating (1-5)
          example: 5
        count:
          type: integer
          description: Number of reviews with this star rating
          example: 750
        percentage:
          type: number
          description: Percentage of total reviews
          example: 60
    ReviewSource:
      type: object
      required:
        - source
        - review_count
        - avg_rating
      properties:
        source:
          type: string
          description: Source platform identifier
          example: shopee_sg
        review_count:
          type: integer
          description: Number of reviews from this source
          example: 500
        avg_rating:
          type: number
          description: Average rating from this source (0-5)
          example: 4.5
        last_scraped:
          type: string
          format: date-time
          description: When this review data was last scraped
          example: '2026-04-04T10:30:00Z'
    ProductReviewsResponse:
      type: object
      required:
        - product_id
      properties:
        product_id:
          type: integer
          description: Product ID
          example: 12345
        review_count:
          type: integer
          nullable: true
          description: Total aggregated review count
          example: 1250
        avg_rating:
          type: number
          nullable: true
          description: Aggregated average rating (0-5)
          example: 4.3
        rating_source:
          type: string
          nullable: true
          description: Primary source of rating data
          example: shopee_sg
        sentiment_score:
          type: number
          nullable: true
          description: Sentiment score derived from review text (0-1 scale, higher = more positive)
          example: 0.86
        rating_distribution:
          type: array
          items:
            $ref: '#/components/schemas/RatingDistributionBucket'
          description: Star rating distribution (1-5 stars)
        sources:
          type: array
          items:
            $ref: '#/components/schemas/ReviewSource'
          description: Per-source review breakdown
  responses:
    Unauthorized:
      description: Invalid or missing API key
      content:
        application/json:
          schema:
            type: object
            properties:
              detail:
                type: string
                example: Invalid or revoked API key
          example:
            detail: Invalid or revoked API key
    RateLimited:
      description: Rate limit exceeded
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds until rate limit resets
          example: 60
      content:
        application/json:
          schema:
            type: object
            properties:
              detail:
                type: string
                example: 'Rate limit exceeded: 1000/minute'
          example:
            detail: 'Rate limit exceeded: 1000/minute'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            type: object
            properties:
              detail:
                type: string
                example: Internal server error
          example:
            detail: Internal server error
