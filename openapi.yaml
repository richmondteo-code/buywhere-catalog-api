openapi: 3.1.0
info:
  title: BuyWhere Catalog API
  description: |
    Agent-native product catalog API for AI agent commerce.
    Query millions of products across Southeast Asia.
  version: 1.0.0
  contact:
    name: BuyWhere Engineering
    url: https://buywhere.ai
  license:
    name: Proprietary
servers:
  - url: https://api.buywhere.ai
    description: Production
  - url: https://staging-api.buywhere.ai
    description: Staging
security:
  - BearerAuth: []
tags:
  - name: products
    description: Product search and retrieval
  - name: search
    description: Full-text product search with PostgreSQL ranking
  - name: categories
    description: Category browsing
  - name: deals
    description: Discounted products priced below historical price
  - name: ingest
    description: Product ingestion for scraping pipelines (batch)
  - name: ingestion
    description: Ingestion run tracking for scraping pipelines
  - name: status
    description: Catalog and scraper health status
  - name: catalog
    description: Catalog quality, health, and statistics
  - name: changelog
    description: Structured API release history for agent consumers
  - name: alerts
    description: Price alert registration and management
  - name: system
    description: Health and API info
paths:
  /health:
    get:
      tags:
        - system
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.0.0
                  environment:
                    type: string
                    example: production
  /v1:
    get:
      tags:
        - system
      summary: API root with endpoint listing
      operationId: apiRoot
      responses:
        '200':
          description: API root information
          content:
            application/json:
              schema:
                type: object
                properties:
                  api:
                    type: string
                    example: BuyWhere Catalog API
                  version:
                    type: string
                    example: v1
                  endpoints:
                    type: object
                    additionalProperties:
                      type: string
                  auth:
                    type: string
                    example: Bearer token required (API key)
                  docs:
                    type: string
                    example: /docs
  /v1/changelog:
    get:
      tags:
        - changelog
      summary: Get structured API changelog
      description: |
        Returns the parsed release history from `CHANGELOG.md` as JSON.
        Intended for agent frameworks and SDKs that need to detect API updates programmatically.
      operationId: getApiChangelog
      responses:
        '200':
          description: Structured API release history
          headers:
            X-API-Version:
              description: API version serving the response
              schema:
                type: string
                example: '1.0'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChangelogResponse'
              example:
                api_version: '1.0'
                releases:
                  - version: 1.0.0
                    date: '2026-04-04'
                    changes:
                      - category: Added
                        group: Product Search & Discovery
                        description: '**`GET /v1/search`** — Full-text product search with filtering and pagination.'
                      - category: Changed
                        group: null
                        description: Search ranking improved from `plainto_tsquery` to `websearch_to_tsquery`.
        '400':
          description: Unsupported version requested
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: UNSUPPORTED_VERSION
                      message:
                        type: string
                        example: 'Version ''2'' is not supported. Supported versions: 1.0, 1, v1'
                      details:
                        type: object
                        properties:
                          supported_versions:
                            type: array
                            items:
                              type: string
                            example:
                              - '1.0'
                              - '1'
                              - v1
  /v1/alerts:
    post:
      tags:
        - alerts
      summary: Create a price alert
      operationId: createAlert
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AlertCreateRequest'
      responses:
        '201':
          description: Price alert created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: NOT_FOUND
                      message:
                        type: string
                        example: The requested resource was not found
                      details:
                        type: object
                        additionalProperties: true
        '409':
          description: Duplicate active alert
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: An active alert with the same product, target price, direction, and callback URL already exists
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
    get:
      tags:
        - alerts
      summary: List price alerts
      operationId: listAlerts
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Price alerts for the authenticated developer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AlertListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/alerts/{alert_id}:
    delete:
      tags:
        - alerts
      summary: Cancel a price alert
      operationId: deleteAlert
      security:
        - BearerAuth: []
      parameters:
        - name: alert_id
          in: path
          required: true
          description: Price alert identifier
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Alert deleted
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                example: {}
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Resource not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: NOT_FOUND
                      message:
                        type: string
                        example: The requested resource was not found
                      details:
                        type: object
                        additionalProperties: true
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/search:
    get:
      tags:
        - search
      summary: Full-text search across product catalog
      description: |
        Full-text search using PostgreSQL ts_rank with English language ranking.
        Supports filtering by category, price range, platform, and availability.
        Results cached for 10 minutes.
        Rate limit: 1000 requests/minute per API key.
      operationId: searchProducts
      security:
        - BearerAuth: []
      parameters:
        - name: q
          in: query
          description: Full-text search query
          required: false
          schema:
            type: string
            example: iphone 15 pro
        - name: category
          in: query
          description: Filter by category (case-insensitive partial match)
          required: false
          schema:
            type: string
            example: Electronics
        - name: min_price
          in: query
          description: Minimum price filter
          required: false
          schema:
            type: number
            format: decimal
            minimum: 0
            example: 100
        - name: max_price
          in: query
          description: Maximum price filter
          required: false
          schema:
            type: number
            format: decimal
            minimum: 0
            example: 999
        - name: platform
          in: query
          description: Filter by platform/source
          required: false
          schema:
            type: string
            enum:
              - lazada_sg
              - shopee_sg
              - carousell
              - qoo10
            example: shopee_sg
        - name: in_stock
          in: query
          description: Filter by availability
          required: false
          schema:
            type: boolean
            example: true
        - name: limit
          in: query
          description: Number of results per page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
            example: 20
        - name: offset
          in: query
          description: Pagination offset
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
            example: 0
      responses:
        '200':
          description: Product search results
          headers:
            X-RateLimit-Limit:
              description: Rate limit per minute
              schema:
                type: integer
                example: 1000
            X-RateLimit-Remaining:
              description: Remaining requests in current window
              schema:
                type: integer
                example: 999
            X-RateLimit-Reset:
              description: Unix timestamp when rate limit resets
              schema:
                type: integer
                example: 1709568060
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
              example:
                total: 1523
                limit: 20
                offset: 0
                has_more: true
                items:
                  - id: 12345
                    sku: SHOPEE-SG-IPHONE15PRO-256-BLK
                    source: shopee_sg
                    merchant_id: shop_abc123
                    name: Apple iPhone 15 Pro 256GB Black
                    description: Latest Apple iPhone 15 Pro with A17 Pro chip
                    price: 1499
                    currency: SGD
                    buy_url: https://shopee.sg/iphone-15-pro
                    affiliate_url: https://affiliate.buywhere.ai/track/123
                    image_url: https://cf.shopee.sg/file/abc123
                    category: Electronics
                    category_path:
                      - Electronics
                      - Phones
                      - Smartphones
                    is_available: true
                    metadata:
                      brand: Apple
                      model: iPhone 15 Pro
                    updated_at: '2026-04-03T10:30:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/products:
    get:
      tags:
        - products
      summary: Search products
      description: |
        Full-text search across product catalog with optional filters.
        Uses PostgreSQL full-text search with English language ranking.
        Rate limit: 1000 requests/minute per API key.
      operationId: searchProductsLegacy
      security:
        - BearerAuth: []
      parameters:
        - name: q
          in: query
          description: Full-text search query
          required: false
          schema:
            type: string
            example: iphone 15 pro
        - name: category
          in: query
          description: Filter by category name (case-insensitive partial match)
          required: false
          schema:
            type: string
            example: Electronics
        - name: min_price
          in: query
          description: Minimum price filter
          required: false
          schema:
            type: number
            format: decimal
            minimum: 0
            example: 100
        - name: max_price
          in: query
          description: Maximum price filter
          required: false
          schema:
            type: number
            format: decimal
            minimum: 0
            example: 999
        - name: source
          in: query
          description: Filter by source platform
          required: false
          schema:
            type: string
            enum:
              - lazada_sg
              - shopee_sg
              - carousell
              - qoo10
            example: shopee_sg
        - name: limit
          in: query
          description: Number of results per page
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
            example: 20
        - name: offset
          in: query
          description: Pagination offset
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
            example: 0
      responses:
        '200':
          description: Product search results
          headers:
            X-RateLimit-Limit:
              description: Rate limit per minute
              schema:
                type: integer
                example: 1000
            X-RateLimit-Remaining:
              description: Remaining requests in current window
              schema:
                type: integer
                example: 999
            X-RateLimit-Reset:
              description: Unix timestamp when rate limit resets
              schema:
                type: integer
                example: 1709568060
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
              example:
                total: 1523
                limit: 20
                offset: 0
                items:
                  - id: 12345
                    sku: SHOPEE-SG-IPHONE15PRO-256-BLK
                    source: shopee_sg
                    merchant_id: shop_abc123
                    name: Apple iPhone 15 Pro 256GB Black
                    description: Latest Apple iPhone 15 Pro with A17 Pro chip
                    price: 1499
                    currency: SGD
                    buy_url: https://shopee.sg/iphone-15-pro
                    affiliate_url: https://affiliate.buywhere.ai/track/123
                    image_url: https://cf.shopee.sg/file/abc123
                    category: Electronics
                    category_path:
                      - Electronics
                      - Phones
                      - Smartphones
                    is_available: true
                    metadata:
                      brand: Apple
                      model: iPhone 15 Pro
                    updated_at: '2026-04-03T10:30:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/products/best-price:
    get:
      tags:
        - products
      summary: Find cheapest product across all platforms
      description: |
        Returns the single lowest-priced listing for a product query.
        Falls back to ILIKE search if full-text search returns no results.
        Rate limit: 1000 requests/minute per API key.
      operationId: bestPrice
      security:
        - BearerAuth: []
      parameters:
        - name: q
          in: query
          description: Product name to search for
          required: true
          schema:
            type: string
            minLength: 1
            example: iphone 15 pro 256gb
        - name: category
          in: query
          description: Optional category filter
          required: false
          schema:
            type: string
            example: Electronics
      responses:
        '200':
          description: Lowest priced product match
          headers:
            X-RateLimit-Limit:
              schema:
                type: integer
                example: 1000
            X-RateLimit-Remaining:
              schema:
                type: integer
                example: 999
            X-RateLimit-Reset:
              schema:
                type: integer
                example: 1709568060
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
              example:
                id: 12345
                sku: SHOPEE-SG-IPHONE15PRO-256-BLK
                source: shopee_sg
                merchant_id: shop_abc123
                name: Apple iPhone 15 Pro 256GB Black
                description: Latest Apple iPhone 15 Pro with A17 Pro chip
                price: 1499
                currency: SGD
                buy_url: https://shopee.sg/iphone-15-pro
                affiliate_url: https://affiliate.buywhere.ai/track/123
                image_url: https://cf.shopee.sg/file/abc123
                category: Electronics
                category_path:
                  - Electronics
                  - Phones
                  - Smartphones
                is_available: true
                metadata:
                  brand: Apple
                  model: iPhone 15 Pro
                updated_at: '2026-04-03T10:30:00Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: No products found for query
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: 'No products found for: ''iphone 15 pro'''
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/products/compare:
    get:
      tags:
        - products
      summary: Compare same product across platforms
      description: |
        Find and compare the same product across different e-commerce platforms.
        Uses fuzzy matching on product title and metadata to identify equivalent products.
        Results cached for 5 minutes.
        Rate limit: 1000 requests/minute per API key.
      operationId: compareProduct
      security:
        - BearerAuth: []
      parameters:
        - name: product_id
          in: query
          description: Source product ID to find matches for
          required: true
          schema:
            type: integer
            example: 12345
        - name: min_price
          in: query
          description: Minimum price filter for matches
          required: false
          schema:
            type: number
            format: decimal
            minimum: 0
            example: 100
        - name: max_price
          in: query
          description: Maximum price filter for matches
          required: false
          schema:
            type: number
            format: decimal
            minimum: 0
            example: 999
      responses:
        '200':
          description: Product comparison results
          headers:
            X-RateLimit-Limit:
              schema:
                type: integer
                example: 1000
            X-RateLimit-Remaining:
              schema:
                type: integer
                example: 999
            X-RateLimit-Reset:
              schema:
                type: integer
                example: 1709568060
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompareResponse'
              example:
                source_product_id: 12345
                source_product_name: Apple iPhone 15 Pro 256GB Black
                total_matches: 4
                matches:
                  - id: 12345
                    sku: SHOPEE-SG-IPHONE15PRO-256-BLK
                    source: shopee_sg
                    merchant_id: shop_abc123
                    name: Apple iPhone 15 Pro 256GB Black
                    description: Latest Apple iPhone 15 Pro with A17 Pro chip
                    price: 1499
                    currency: SGD
                    buy_url: https://shopee.sg/iphone-15-pro
                    affiliate_url: https://affiliate.buywhere.ai/track/123
                    image_url: https://cf.shopee.sg/file/abc123
                    category: Electronics
                    category_path:
                      - Electronics
                      - Phones
                      - Smartphones
                    is_available: true
                    metadata:
                      brand: Apple
                      model: iPhone 15 Pro
                    updated_at: '2026-04-03T10:30:00Z'
                    match_score: 0.95
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Source product not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: Product not found
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      tags:
        - products
      summary: Compare multiple products across platforms
      description: |
        Compare up to 20 products across platforms in a single request.
        Uses fuzzy matching on product title and metadata to identify equivalent products.
        Results cached for 5 minutes.
        Rate limit: 1000 requests/minute per API key.
      operationId: compareProductsMatrix
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompareMatrixRequest'
            example:
              product_ids:
                - 12345
                - 12346
                - 12347
              min_price: 100
              max_price: 2000
      responses:
        '200':
          description: Matrix comparison results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompareMatrixResponse'
              example:
                total_products: 3
                comparisons:
                  - source_product_id: 12345
                    source_product_name: Apple iPhone 15 Pro 256GB Black
                    total_matches: 4
                    matches:
                      - id: 12345
                        sku: SHOPEE-SG-IPHONE15PRO-256-BLK
                        source: shopee_sg
                        merchant_id: shop_abc123
                        name: Apple iPhone 15 Pro 256GB Black
                        description: Latest Apple iPhone 15 Pro with A17 Pro chip
                        price: 1499
                        currency: SGD
                        buy_url: https://shopee.sg/iphone-15-pro
                        affiliate_url: https://affiliate.buywhere.ai/track/123
                        image_url: https://cf.shopee.sg/file/abc123
                        category: Electronics
                        category_path:
                          - Electronics
                          - Phones
                          - Smartphones
                        is_available: true
                        metadata:
                          brand: Apple
                          model: iPhone 15 Pro
                        updated_at: '2026-04-03T10:30:00Z'
                        match_score: 0.95
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/products/compare/diff:
    post:
      tags:
        - products
      summary: Compare 2-5 products directly — returns structured diff
      description: |
        Compare 2-5 products directly and return a structured field-level diff.
        Shows which fields are identical vs different across products.
        Includes price ranking (cheapest/most expensive).
        Rate limit: 1000 requests/minute per API key.
      operationId: compareProductsDiff
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompareDiffRequest'
            example:
              product_ids:
                - 12345
                - 12346
                - 12347
              include_image_similarity: false
      responses:
        '200':
          description: Structured product diff
          headers:
            X-RateLimit-Limit:
              schema:
                type: integer
                example: 1000
            X-RateLimit-Remaining:
              schema:
                type: integer
                example: 999
            X-RateLimit-Reset:
              schema:
                type: integer
                example: 1709568060
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompareDiffResponse'
              example:
                products:
                  - id: 12345
                    sku: SHOPEE-SG-IPHONE15PRO-256-BLK
                    source: shopee_sg
                    merchant_id: shop_abc123
                    name: Apple iPhone 15 Pro 256GB Black
                    description: Latest Apple iPhone 15 Pro with A17 Pro chip
                    price: 1499
                    currency: SGD
                    buy_url: https://shopee.sg/iphone-15-pro
                    affiliate_url: https://affiliate.buywhere.ai/track/123
                    image_url: https://cf.shopee.sg/file/abc123
                    category: Electronics
                    category_path:
                      - Electronics
                      - Phones
                      - Smartphones
                    is_available: true
                    metadata:
                      brand: Apple
                      model: iPhone 15 Pro
                    updated_at: '2026-04-03T10:30:00Z'
                    price_rank: 2
                  - id: 12346
                    sku: LAZADA-SG-IPHONE15PRO-256-BLK
                    source: lazada_sg
                    merchant_id: lazada_xyz
                    name: Apple iPhone 15 Pro 256GB Black
                    description: Apple iPhone 15 Pro 256GB Black
                    price: 1399
                    currency: SGD
                    buy_url: https://lazada.sg/iphone-15-pro
                    affiliate_url: https://affiliate.buywhere.ai/track/124
                    image_url: https://cf.lazada.sg/file/def456
                    category: Electronics
                    category_path:
                      - Electronics
                      - Phones
                      - Smartphones
                    is_available: true
                    metadata:
                      brand: Apple
                      model: iPhone 15 Pro
                    updated_at: '2026-04-03T10:30:00Z'
                    price_rank: 1
                field_diffs:
                  - field: price
                    values:
                      - 1499
                      - 1399
                    all_identical: false
                  - field: buy_url
                    values:
                      - https://shopee.sg/iphone-15-pro
                      - https://lazada.sg/iphone-15-pro
                    all_identical: false
                identical_fields:
                  - name
                  - description
                  - brand
                  - category
                cheapest_product_id: 12346
                most_expensive_product_id: 12345
                price_spread: 100
                price_spread_pct: 7.15
        '400':
          description: Invalid request (must provide 2-5 product IDs)
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: product_ids must contain between 2 and 5 IDs
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: One or more products not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: 'Products not found: [99999]'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/products/trending:
    get:
      tags:
        - products
      summary: Get trending products by category
      description: |
        Returns recently updated products, useful for discovering trending items.
        Sorted by most recently updated first.
        Results cached for 5 minutes.
        Rate limit: 1000 requests/minute per API key.
      operationId: getTrendingProducts
      security:
        - BearerAuth: []
      parameters:
        - name: category
          in: query
          description: Filter by category name
          required: false
          schema:
            type: string
            example: Electronics
        - name: limit
          in: query
          description: Number of products to return
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
            example: 50
      responses:
        '200':
          description: Trending products
          headers:
            X-RateLimit-Limit:
              schema:
                type: integer
                example: 1000
            X-RateLimit-Remaining:
              schema:
                type: integer
                example: 999
            X-RateLimit-Reset:
              schema:
                type: integer
                example: 1709568060
          content:
            application/json:
              schema:
