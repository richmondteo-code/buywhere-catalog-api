components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT or API key
      description: |
        Authentication via API key or JWT token.
        - For direct API keys: use the key prefixed with `bw_` as-is
        - For JWT tokens: obtain via OAuth flow, contains `key_id` claim
        All API requests must include this header.
  schemas:
    AlertCreateRequest:
      type: object
      required:
        - product_id
        - target_price
        - callback_url
      properties:
        product_id:
          type: integer
          description: Product ID to monitor
          example: 12345
        target_price:
          type: number
          format: decimal
          minimum: 0.01
          description: Trigger threshold price
          example: 999.99
        direction:
          type: string
          enum:
            - below
            - above
          default: below
          description: Trigger when the live price crosses the target in this direction
        currency:
          type: string
          minLength: 3
          maxLength: 3
          default: SGD
          description: ISO-4217 currency code
          example: SGD
        callback_url:
          type: string
          format: uri
          description: Webhook URL called when the alert triggers
          example: https://example.com/hooks/price-alert
    AlertResponse:
      type: object
      required:
        - id
        - product_id
        - target_price
        - direction
        - currency
        - callback_url
        - is_active
        - created_at
      properties:
        id:
          type: string
          format: uuid
          example: 650c9d87-fb77-45d2-80f9-875c1c932d57
        product_id:
          type: integer
          example: 12345
        target_price:
          type: number
          format: decimal
          example: 999.99
        direction:
          type: string
          enum:
            - below
            - above
          example: below
        currency:
          type: string
          example: SGD
        callback_url:
          type: string
          format: uri
          example: https://example.com/hooks/price-alert
        is_active:
          type: boolean
          example: true
        triggered_at:
          type: string
          format: date-time
          nullable: true
          example: '2026-04-04T14:00:00Z'
        created_at:
          type: string
          format: date-time
          example: '2026-04-04T13:55:00Z'
    AlertListResponse:
      type: object
      required:
        - alerts
        - total
        - limit
      properties:
        alerts:
          type: array
          items:
            $ref: '#/components/schemas/AlertResponse'
        total:
          type: integer
          example: 1
        limit:
          type: integer
          example: 100
    ChangelogChange:
      type: object
      required:
        - category
        - description
      properties:
        category:
          type: string
          description: Changelog section heading
          example: Added
        group:
          type: string
          nullable: true
          description: Optional subgroup heading under the section
          example: Product Search & Discovery
        description:
          type: string
          description: Raw changelog bullet text
          example: '**`GET /v1/search`** — Full-text product search with filtering and pagination.'
    ChangelogRelease:
      type: object
      required:
        - version
        - date
        - changes
      properties:
        version:
          type: string
          description: Semantic API release version
          example: 1.0.0
        date:
          type: string
          format: date
          description: Release date in ISO-8601 format
          example: '2026-04-04'
        changes:
          type: array
          items:
            $ref: '#/components/schemas/ChangelogChange'
    ChangelogResponse:
      type: object
      required:
        - api_version
        - releases
      properties:
        api_version:
          type: string
          description: Current API version emitted in response headers
          example: '1.0'
        releases:
          type: array
          items:
            $ref: '#/components/schemas/ChangelogRelease'
    ProductResponse:
      type: object
      required:
        - id
        - sku
        - source
        - merchant_id
        - name
        - price
        - currency
        - buy_url
        - is_available
        - updated_at
      properties:
        id:
          type: integer
          description: Unique product ID
          example: 12345
        sku:
          type: string
          description: Unique product identifier within the source
          example: SHOPEE-SG-IPHONE15PRO-256-BLK
        source:
          type: string
          description: Source platform
          enum:
            - lazada_sg
            - shopee_sg
            - carousell
            - qoo10
          example: shopee_sg
        merchant_id:
          type: string
          description: Merchant/platform shop identifier
          example: shop_abc123
        name:
          type: string
          description: Product title
          example: Apple iPhone 15 Pro 256GB Black
        description:
          type: string
          nullable: true
          description: Product description
          example: Latest Apple iPhone 15 Pro with A17 Pro chip
        price:
          type: number
          format: decimal
          description: Product price
          example: 1499
        currency:
          type: string
          description: Currency code
          example: SGD
        buy_url:
          type: string
          format: uri
          description: Direct purchase URL
          example: https://shopee.sg/iphone-15-pro
        affiliate_url:
          type: string
          format: uri
          nullable: true
          description: Tracked affiliate URL for revenue tracking
          example: https://affiliate.buywhere.ai/track/123
        image_url:
          type: string
          format: uri
          nullable: true
          description: Product image URL
          example: https://cf.shopee.sg/file/abc123
        category:
          type: string
          nullable: true
          description: Primary category name
          example: Electronics
        category_path:
          type: array
          items:
            type: string
          nullable: true
          description: Category hierarchy from root to leaf
          example:
            - Electronics
            - Phones
            - Smartphones
        is_available:
          type: boolean
          description: Whether product is currently active/available
          example: true
        metadata:
          type: object
          nullable: true
          description: Additional product metadata
          additionalProperties: true
          example:
            brand: Apple
            model: iPhone 15 Pro
            storage: 256GB
        updated_at:
          type: string
          format: date-time
          description: Last update timestamp
          example: '2026-04-03T10:30:00Z'
    ProductListResponse:
      type: object
      required:
        - total
        - limit
        - offset
        - items
        - has_more
      properties:
        total:
          type: integer
          description: Total number of matching products
          example: 1523
        limit:
          type: integer
          description: Results per page
          example: 20
        offset:
          type: integer
          description: Pagination offset
          example: 0
        has_more:
          type: boolean
          description: Whether there are more results available
          example: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProductResponse'
    CategoryNode:
      type: object
      required:
        - name
        - count
      properties:
        name:
          type: string
          description: Category name
          example: Electronics
        count:
          type: integer
          description: Number of active products in this category
          example: 45230
        children:
          type: array
          items:
            $ref: '#/components/schemas/CategoryNode'
          default: []
    CategoryResponse:
      type: object
      required:
        - categories
        - total
      properties:
        categories:
          type: array
          items:
            $ref: '#/components/schemas/CategoryNode'
        total:
          type: integer
          description: Total number of categories
          example: 48
    IngestProductItem:
      type: object
      required:
        - sku
        - merchant_id
        - title
        - price
        - url
      properties:
        sku:
          type: string
          description: Unique product SKU within the source
          example: SHOPEE-SG-IPHONE15PRO-256-BLK
        merchant_id:
          type: string
          description: Merchant/platform shop identifier
          example: shop_abc123
        title:
          type: string
          description: Product title/name
          example: Apple iPhone 15 Pro 256GB Black
        description:
          type: string
          nullable: true
          description: Product description
          example: Latest Apple iPhone 15 Pro with A17 Pro chip
        price:
          type: number
          format: decimal
          minimum: 0
          description: Product price
          example: 1499
        currency:
          type: string
          default: SGD
          description: Currency code
          example: SGD
        url:
          type: string
          format: uri
          description: Direct product URL
          example: https://shopee.sg/iphone-15-pro
        image_url:
          type: string
          format: uri
          nullable: true
          description: Product image URL
          example: https://cf.shopee.sg/file/abc123
        category:
          type: string
          nullable: true
          description: Primary category
          example: Electronics
        category_path:
          type: array
          items:
            type: string
          nullable: true
          description: Category hierarchy
          example:
            - Electronics
            - Phones
            - Smartphones
        brand:
          type: string
          nullable: true
          description: Brand name
          example: Apple
        is_active:
          type: boolean
          default: true
          description: Whether product is active/listed
          example: true
        is_available:
          type: boolean
          nullable: true
          description: Whether product is in stock and available for purchase (null=infer from in_stock)
          example: true
        last_checked:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when availability was last checked
          example: '2026-04-03T10:30:00Z'
        in_stock:
          type: boolean
          nullable: true
          description: Whether product is currently in stock
          example: true
        availability:
          type: string
          nullable: true
          description: Raw availability string (in_stock, out_of_stock, pre_order, etc.)
          example: in_stock
        metadata:
          type: object
          nullable: true
          description: Additional product metadata
          additionalProperties: true
    IngestRequest:
      type: object
      required:
        - source
        - products
      properties:
        source:
          type: string
          description: Source platform
          enum:
            - lazada_sg
            - shopee_sg
            - carousell
            - qoo10
          example: shopee_sg
        products:
          type: array
          minItems: 1
          maxItems: 1000
          items:
            $ref: '#/components/schemas/IngestProductItem'
    IngestError:
      type: object
      required:
        - index
        - sku
        - error
      properties:
        index:
          type: integer
          description: Index of the failed product in the request array
          example: 15
        sku:
          type: string
          description: SKU of the failed product
          example: INVALID-SKU
        error:
          type: string
          description: Error message
          example: Unique constraint violation
    IngestResponse:
      type: object
      required:
        - run_id
        - status
        - rows_inserted
        - rows_updated
        - rows_failed
        - errors
      properties:
        run_id:
          type: integer
          description: Ingestion run ID
          example: 42
        status:
          type: string
          enum:
