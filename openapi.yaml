              schema:
                type: integer
                example: 1709568060
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionRunResponse'
              example:
                id: 42
                source: shopee_sg
                status: running
                rows_inserted: 500
                rows_updated: 25
                rows_failed: 0
                started_at: '2026-04-03T10:00:00Z'
                finished_at: null
                error_message: null
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Ingestion run not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: Ingestion run not found
        '409':
          description: Run cannot be updated (not in running status)
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: Cannot update run with status 'completed' — only running runs can be updated
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /v1/ingestion/{run_id}/complete:
    post:
      tags:
        - ingestion
      summary: Mark ingestion run as complete
      description: |
        Mark a running ingestion run as completed, failed, or cancelled.
        This finalizes the run and clears related caches.
        Rate limit: 100 requests/minute per API key.
      operationId: completeIngestionRun
      security:
        - BearerAuth: []
      parameters:
        - name: run_id
          in: path
          description: Ingestion run ID
          required: true
          schema:
            type: integer
            example: 42
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestionRunComplete'
            example:
              status: completed
              rows_inserted: 950
              rows_updated: 48
              rows_failed: 2
      responses:
        '200':
          description: Completed ingestion run
          headers:
            X-RateLimit-Limit:
              schema:
                type: integer
                example: 100
            X-RateLimit-Remaining:
              schema:
                type: integer
                example: 99
            X-RateLimit-Reset:
              schema:
                type: integer
                example: 1709568060
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionRunResponse'
              example:
                id: 42
                source: shopee_sg
                status: completed
                rows_inserted: 950
                rows_updated: 48
                rows_failed: 2
                error_message: null
                started_at: '2026-04-03T10:00:00Z'
                finished_at: '2026-04-03T10:05:30Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Ingestion run not found
          content:
            application/json:
              schema:
                type: object
                properties:
