[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "buywhere-openai"
version = "0.1.0"
description = "BuyWhere OpenAI integration - product search, price comparison, and deals as OpenAI tools"
readme = "README.md"
license = "MIT"
authors = [
    { name = "BuyWhere", email = "api@buywhere.ai" }
]
requires-python = ">=3.10"
keywords = ["buywhere", "openai", "function-calling", "product-search", "shopping"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "httpx>=0.27.0",
]

[project.urls]
Home = "https://buywhere.ai"
Source = "https://github.com/buywhere/buywhere-site"
Documentation = "https://api.buywhere.ai/docs/guides/mcp"

[tool.setuptools.packages.find]
where = ["src"]
