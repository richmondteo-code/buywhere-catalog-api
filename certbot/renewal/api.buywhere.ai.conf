# Certbot renewal configuration for api.buywhere.ai
# This file should be deployed to /etc/letsencrypt/renewal/api.buywhere.ai.conf
# Deploy with: sudo cp certbot/renewal/api.buywhere.ai.conf /etc/letsencrypt/renewal/

domain = api.buywhere.ai
domains = api.buywhere.ai docs.buywhere.ai
cert = /etc/letsencrypt/live/api.buywhere.ai/fullchain.pem
privkey = /etc/letsencrypt/live/api.buywhere.ai/privkey.pem
chain = /etc/letsencrypt/live/api.buywhere.ai/chain.pem
fullchain = /etc/letsencrypt/live/api.buywhere.ai/fullchain.pem

account = system
arch = x86_64
authenticator = webroot
webroot-path = /var/www/html
allow_subset = no
expand = yes
reuse-key = yes
key-type = rsa
random_serial = yes

post-hook = systemctl reload nginx
renew-hook = systemctl reload nginx