# Certbot renewal configuration for us.buywhere.com
# This file should be deployed to /etc/letsencrypt/renewal/us.buywhere.com.conf
# Deploy with: sudo cp certbot/renewal/us.buywhere.com.conf /etc/letsencrypt/renewal/

domain = us.buywhere.com
domains = us.buywhere.com
cert = /etc/letsencrypt/live/us.buywhere.com/fullchain.pem
privkey = /etc/letsencrypt/live/us.buywhere.com/privkey.pem
chain = /etc/letsencrypt/live/us.buywhere.com/chain.pem
fullchain = /etc/letsencrypt/live/us.buywhere.com/fullchain.pem

account = system
arch = x86_64
authenticator = webroot
webroot-path = /var/www/html
allow_subset = no
expand = yes
reuse-key = yes
key-type = rsa
random_serial = yes

post-hook = systemctl reload nginx
renew-hook = systemctl reload nginx