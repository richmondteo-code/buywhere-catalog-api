site_name: BuyWhere API Documentation
site_url: https://docs.buywhere.ai/
site_description: The agent-native product catalog API for AI commerce across Singapore and Southeast Asia.
site_author: BuyWhere

repo_name: buywhere-catalog-api
repo_url: https://github.com/richmondteo-code/buywhere-catalog-api

docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  logo: https://buywhere.ai/favicon.ico
  favicon: https://buywhere.ai/favicon.ico

plugins:
  - search
  - swagger-ui-tag

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Quickstart: QUICKSTART.md
  - SDKs: sdks.md
  - Changelog: changelog.md
  - Versioning: versioning.md
  - API Reference:
      - OpenAPI Spec: api-reference/openapi.md
      - API Reference (Manual): api-reference/index.md
  - Pricing: pricing.md
  - Rate Limits: rate-limits.md
  - Guides:
      - Authentication: guides/authentication.md
      - LangChain Integration: LANGCHAIN_GUIDE.md
  - Code Samples: samples/index.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/richmondteo-code/buywhere-catalog-api
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/buywhere/
  analytics:
    provider: google
    property: !ENV [GOOGLE_ANALYTICS_KEY, ""]
