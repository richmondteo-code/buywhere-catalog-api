[SERVICE]
    Flush         5
    Log_Level     info
    Daemon        off
    Parsers_File  parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020
    Health_Check   On

[INPUT]
    Name              tail
    Path              /var/lib/docker/containers/*/*.log
    Parser            docker
    Tag               docker.*
    Refresh_Interval  5
    Mem_Buf_Limit    50MB
    Skip_Long_Lines  On
    DB                /var/log/flb_docker.db

[INPUT]
    Name              tail
    Path              /app/logs/*.log
    Parser            json
    Tag               app.*
    Refresh_Interval  5
    Mem_Buf_Limit    50MB
    Skip_Long_Lines  On
    DB                /var/log/flb_app.db

[FILTER]
    Name                parser
    Match               docker.*
    Key_Name            log
    Parser              docker-container
    Reserve_Data        On

[FILTER]
    Name                kubernetes
    Match               docker.*
    Kube_URL            https://kubernetes.default.svc:443
    Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
    Kube_Tag_Prefix     docker.var.lib.docker.containers
    Merge_Log           On
    Merge_Log_Key       log_processed
    K8S-Logging.Parser  On
    K8S-Logging.Exclude On
    Labels              On
    Annotations         Off

[FILTER]
    Name                parser
    Match               docker.*
    Key_Name            log
    Parser              json
    Reserve_Data        On

[FILTER]
    Name                modify
    Match               docker.*
    Add                 environment production

[FILTER]
    Name                parser
    Match               app.*
    Key_Name            log
    Parser              json
    Reserve_Data        On

[FILTER]
    Name                modify
    Match               app.*
    Add                 environment production

[FILTER]
    Name                lua
    Match               *
    Script              /fluent-bit/scripts/timestamp.lua
    Call                inject_timestamp

[OUTPUT]
    Name                loki
    Match               *
    Host                loki
    Port                3100
    TenantID            production
    Labels              job=fluent-bit,environment=production,cluster=buywhere-production
    Label_Keys          environment,cluster,namespace,container_name,app,service
    Remove_Keys         kubernetes,kube_tag,log_processed
    Line_Frequency      10
    BatchWait           10
    BatchSize           102400
    Retries             5
    Auto_Kubernetes_Labels On

[OUTPUT]
    Name                stdout
    Match               *
    Format              json_lines
